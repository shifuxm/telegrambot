<style>

/* ── Kalendar kuni (asosiy) ── */
.cald {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  transition: background .12s, color .12s, transform .1s;
  position: relative;
  font-weight: 500;
}
.cald:hover:not(.past) {
  background: #F0EAFE;
  transform: scale(1.08);
}

/* Bugungi kun */
.cald.td {
  font-weight: 800;
  color: #2D5BFF;
}

/* O'tgan kunlar */
.cald.past {
  color: #D1D5DB;
  pointer-events: none;
  opacity: 0.5;
}

/* Slot 1 — Ko'k (tanlangan) */
.cald.sel-1 {
  background: #2D5BFF !important;
  color: #fff !important;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(45,91,255,.35);
}
.cald.sel-1.past {
  background: #93AFFF !important;
  color: #fff !important;
  pointer-events: auto;
  opacity: 0.7;
}

/* Slot 2 — Yashil */
.cald.sel-2 {
  background: #10B981 !important;
  color: #fff !important;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(16,185,129,.35);
}
.cald.sel-2.past {
  background: #6EE7B7 !important;
  color: #fff !important;
  pointer-events: auto;
  opacity: 0.7;
}

/* Slot 3 — To'q sariq */
.cald.sel-3 {
  background: #F59E0B !important;
  color: #fff !important;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(245,158,11,.35);
}
.cald.sel-3.past {
  background: #FCD34D !important;
  color: #fff !important;
  pointer-events: auto;
  opacity: 0.7;
}

/* Eski .sel — orqaga mos (1-slot bilan bir xil) */
.cald.sel {
  background: #2D5BFF !important;
  color: #fff !important;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(45,91,255,.35);
}
.cald.sel.past {
  color: #fff !important;
  pointer-events: auto;
}

/* Bir kunda bir nechta slot belgisi (nuqta) */
.cald-dot {
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 2px;
}
.cald-dot span {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  display: block;
}

/* ── Slot tab tugmalari ── */
.slot-tab {
  flex: 1;
  padding: 9px 6px;
  border-radius: 10px;
  border: 1.5px solid transparent;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  line-height: 1.3;
}
.slot-tab.active-1 {
  background: #EAF0FF;
  color: #2D5BFF;
  border-color: #2D5BFF;
}
.slot-tab.active-2 {
  background: #E6F8F0;
  color: #10B981;
  border-color: #10B981;
}
.slot-tab.active-3 {
  background: #FEF4E0;
  color: #F59E0B;
  border-color: #F59E0B;
}
.slot-tab.inactive {
  background: #F8F9FC;
  color: #8A93AD;
  border-color: #EAEDF3;
}
.slot-tab.add-slot {
  background: #F8F9FC;
  color: #8A93AD;
  border: 1.5px dashed #D1D5DB;
}
.slot-tab.add-slot:hover {
  background: #F0EAFE;
  color: #8056F5;
  border-color: #8056F5;
}

/* ── Jadval sahifasi karta uslubi ── */
.sch-card {
  background: #fff;
  border-radius: 18px;
  border: 1.5px solid #EAEDF3;
  padding: 0;
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.sch-day-row {
  display: flex;
  align-items: flex-start;
  padding: 14px 16px;
  border-bottom: 1px solid #F2F4F8;
  gap: 12px;
}
.sch-day-row:last-child { border-bottom: none; }
.sch-day-badge {
  min-width: 44px;
  text-align: center;
  padding: 6px 4px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}
.sch-group-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  margin: 2px;
}
</style>

<script>

// ============ CORE ============
const tg = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}

function getTid(){
  const uid = tg?.initDataUnsafe?.user?.id;
  if(uid) return uid.toString();
  try{
    const raw = tg?.initData || '';
    if(raw){
      const p = new URLSearchParams(raw);
      const u = JSON.parse(decodeURIComponent(p.get('user') || '{}'));
      if(u.id) return u.id.toString();
    }
  }catch(e){}
  return null;
}

async function api(method, path, body){
  const tid = getTid();
  const headers = {'Content-Type':'application/json'};
  if(tid) headers['x-telegram-id'] = tid;
  const r = await fetch('/api'+path, {method, headers, body: body ? JSON.stringify(body) : undefined});
  const d = await r.json();
  if(!r.ok) throw new Error(d.error || 'Xatolik');
  return d;
}
const G = p => api('GET', p);
const P = (p, b) => api('POST', p, b);
const U = (p, b) => api('PUT', p, b);
const D = p => api('DELETE', p);

function fmt(n){ return Number(n).toLocaleString('ru-RU') + " so'm"; }
function mLabel(my){ if(!my)return''; const[y,m]=my.split('-'); const ms=['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentyabr','Oktyabr','Noyabr','Dekabr']; return ms[parseInt(m)-1]+' '+y; }
function sixMonths(){ const now=new Date(),res=[]; for(let i=-2;i<=3;i++){ const d=new Date(now.getFullYear(),now.getMonth()+i,1); const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; if(k>='2026-04')res.push(k); } return res; }
function nowMonth(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; }

let _tt;
function toast(msg, ms=2800){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(_tt); _tt=setTimeout(()=>t.style.display='none', ms); }
function ldHtml(){ return `<div style="display:flex;justify-content:center;padding:48px"><svg style="animation:spin .7s linear infinite" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#07568A" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg></div>`; }
function emHtml(msg){ return `<div style="text-align:center;padding:48px 20px;color:#9ca3af"><div style="font-size:48px;margin-bottom:12px">📭</div><div style="font-size:14px">${msg}</div></div>`; }

function openModal(title, html){
  closeModal();
  const d = document.createElement('div');
  d.id = 'modal';
  d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end';
  d.innerHTML = `<div style="background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease;overscroll-behavior:contain">
    <div style="padding:12px 20px 16px;border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:#fff;z-index:10">
      <div style="width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 14px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:18px;font-weight:700">${title}</div>
        <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#9ca3af;padding:0">×</button>
      </div>
    </div>
    <div style="padding:16px 20px 32px">${html}</div>
  </div>`;
  d.addEventListener('click', e => { if(e.target===d) closeModal(); });
  document.getElementById('modals').appendChild(d);
}
function closeModal(){ const m=document.getElementById('modal'); if(m) m.remove(); }

const TITLES = {
  stats:      'Statistika',
  students:   "O'quvchilar",
  staff:      'Hodimlar',
  schedule:   'Dars jadvali',
  debtors:    'Qarzdorlar',
  attendance: 'Davomat',
  archived:   "O'chirilgan O'quvchilar",   // ← yangi
  settings:   'Sozlamalar',
  delstaff:   "O'chirish",
};

let curPage='stats';

function nav(page){
  curPage=page;
  document.getElementById('pgTitle').textContent=TITLES[page]||page;
  document.querySelectorAll('.nl').forEach(el=>el.classList.toggle('active',el.id===`nl_${page}`));
  sbClose();
  const el=document.getElementById('content');
  el.innerHTML=ldHtml();
  ({stats:rStats,students:rStudents,staff:rStaff,schedule:rSchedule,
    debtors:rDebtors,attendance:rAttendance,archived:rArchivedStudents,
    settings:rSettings,delstaff:rDelStaff})[page]?.(el);
}

function setupSidebar(user){
  document.getElementById('sbName').textContent=`${user.firstName||''} ${user.lastName||''}`;
  document.getElementById('sbNav').innerHTML=ADMIN_NAV.map(n=>`
    <div class="nl${curPage===n.id?' active':''}" id="nl_${n.id}" onclick="nav('${n.id}')">
      <div class="nic">${n.svg}</div><span>${n.label}</span>
    </div>`).join('');
}

             style="${m === sel
               ? 'background:#2D5BFF;color:#fff;border-color:#2D5BFF;box-shadow:0 4px 12px rgba(45,91,255,.35);'

  // ── Pul formatlash ──

  // ── Ma'lumotlarni yuklash ──
  async function load() {
    el.innerHTML = mpHtml() + ldSkeletonStats();
    try {

      const [d, staffList] = await Promise.all([
        G(`/statistics?monthYear=${sel}`),
        G('/staff')

      draw(d, staffCount);

            value: d.totalStudents,

            onclick: "nav('students')"
          })}

          ${statCard({
            icon: "M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6",
            iconColor: "#F59E0B", iconBg: "#FEF4E0",
            value: d.paidStudents ?? 0,
            label: `To'lov Qildi (${mLabel(sel)})`,
            sublabel: d.totalStudents
              ? `${Math.round((d.paidStudents / d.totalStudents) * 100)}%`

          })}

    const expenses = await G('/expenses');
    const byStaff = {}, byCommunal = {}, otherList = [];
    for (const e of expenses) {
      if (e.category === 'staff') {
        const k = e.staffId || 'unknown';
        if (!byStaff[k]) byStaff[k] = {
          name: e.staff ? `${e.staff.firstName} ${e.staff.lastName}` : "Noma'lum",
          items: []
        };
        byStaff[k].items.push(e);
      } else if (e.category === 'communal') {
        const k = e.subcategory || 'Boshqa';
        if (!byCommunal[k]) byCommunal[k] = [];
        byCommunal[k].push(e);
      } else {
        otherList.push(e);
      }
    }

    function eItem(e) {
      const dt = new Date(e.createdAt);
      const ds = `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
      return `<div style="display:flex;justify-content:space-between;align-items:center;
               padding:10px 0;border-bottom:1px solid #F5F7FB;">
        <div>
          <div style="font-size:14px;font-weight:600;">${e.monthYear || ds}</div>
          ${e.note ? `<div style="font-size:12px;color:#8A93AD;">${e.note}</div>` : ''}

        </div>
        <div style="font-size:15px;font-weight:700;color:#EF4444;white-space:nowrap;">${fmtSum(e.amount)}</div>
      </div>`;
    }

    const grandTotal = expenses.reduce((s, e) => s + BigInt(e.amount), BigInt(0));
    let html = `<div style="background:#FEF2F2;border-radius:14px;padding:14px 16px;margin-bottom:20px;
       display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;font-weight:800;color:#DC2626;letter-spacing:0.4px;">JAMI CHIQIM</span>
      <span style="font-size:20px;font-weight:800;color:#DC2626;">${fmtSum(grandTotal.toString())}</span>
    </div>`;

    // Hodim maoshi
    if (Object.keys(byStaff).length) {
      html += `<div style="margin-bottom:20px;">
        <div style="font-size:13px;font-weight:700;color:#0B1437;margin-bottom:10px;
             display:flex;align-items:center;gap:8px;">

            </svg>
          </div>
          Hodim Maoshi
        </div>`;
      for (const [, v] of Object.entries(byStaff)) {
        const total = v.items.reduce((s, e) => s + BigInt(e.amount), BigInt(0));
        html += `<div style="background:#FAFAFA;border-radius:14px;padding:12px 14px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:14px;font-weight:700;">${v.name}</span>
            <span style="font-size:14px;font-weight:800;color:#EF4444;">${fmtSum(total.toString())}</span>
          </div>
          ${v.items.map(eItem).join('')}
        </div>`;
      }
      html += `</div>`;
    }

    // Kommunal
    if (Object.keys(byCommunal).length) {
      html += `<div style="margin-bottom:20px;">
        <div style="font-size:13px;font-weight:700;color:#0B1437;margin-bottom:10px;
             display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:8px;background:#FEF4E0;
               display:flex;align-items:center;justify-content:center;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          Kommunal To'lovlar
        </div>`;
      for (const [k, items] of Object.entries(byCommunal)) {
        const total = items.reduce((s, e) => s + BigInt(e.amount), BigInt(0));
        html += `<div style="background:#FAFAFA;border-radius:14px;padding:12px 14px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:14px;font-weight:700;">${k}</span>
            <span style="font-size:14px;font-weight:800;color:#EF4444;">${fmtSum(total.toString())}</span>
          </div>
          ${items.map(eItem).join('')}
        </div>`;
      }
      html += `</div>`;
    }

    // Boshqa chiqimlar
    if (otherList.length) {
      const total = otherList.reduce((s, e) => s + BigInt(e.amount), BigInt(0));
      html += `<div style="margin-bottom:20px;">
        <div style="font-size:13px;font-weight:700;color:#0B1437;margin-bottom:10px;
             display:flex;align-items:center;gap:8px;">
          <div style="width:28px;height:28px;border-radius:8px;background:#F3F4F6;
               display:flex;align-items:center;justify-content:center;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
          </div>
          Boshqa Chiqimlar
        </div>
        <div style="background:#FAFAFA;border-radius:14px;padding:12px 14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="font-size:14px;font-weight:700;">Jami</span>
            <span style="font-size:14px;font-weight:800;color:#EF4444;">${fmtSum(total.toString())}</span>
          </div>
          ${otherList.map(eItem).join('')}
        </div>
      </div>`;
    }

    if (!expenses.length) {
      html += `<div style="text-align:center;padding:32px;color:#8A93AD;font-size:14px;">
        Hech qanday chiqim topilmadi
      </div>`;
    }

    openModal("Barcha Chiqimlar", html);
  }

  // ── Ishga tushirish ──
  load();
}

// ============ STUDENTS ============
async function rStudents(el) {
  const FONT = "'Plus Jakarta Sans','Inter',system-ui,sans-serif";

  const ICO = {
    search:  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
    user:    `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2D5BFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
    chevron: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`,
    check:   `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    x:       `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
    dash:    `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    tag:     `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
    archive: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
    wallet:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/></svg>`,
    clock:   `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  };

  let srch = '';
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;background:#F3F4F6;
                border-radius:14px;padding:11px 14px;margin-bottom:16px;">
      ${ICO.search}
      <input placeholder="Ism yoki familya..." oninput="stSrch(this.value)"
        style="border:none;background:transparent;outline:none;font-size:15px;
               flex:1;font-family:${FONT};color:#0B1437;"/>
    </div>
    <div id="stList"></div>`;

  window.stSrch = v => { srch = v; load(); };

  async function load() {
    const data = await G(`/students${srch ? `?search=${encodeURIComponent(srch)}` : ''}`);
    const list = document.getElementById('stList');
    if (!data.length) { list.innerHTML = emHtml ? emHtml("O'quvchilar yo'q") : ''; return; }

    list.innerHTML = `<div class="card" style="padding:0;overflow:hidden;">
      ${data.map(s => `
        <div class="li" onclick="openStudent(${s.id})">
          <div class="lic" style="background:#EAF0FF;">${ICO.user}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:15px;font-weight:700;color:#0B1437;font-family:${FONT};">
              ${s.applicant.firstName} ${s.applicant.lastName}
            </div>
            <div style="font-size:12px;color:#8A93AD;margin-top:2px;font-family:${FONT};">
              ${s.groupStudents.map(gs => gs.group.subject.name).join(', ')}
            </div>
          </div>
          ${ICO.chevron}
        </div>`).join('')}
    </div>`;
  }

  // ── Davomat jadvali ──────────────────────────────────────────────
  window.showAttJadval = async (studentId, groupId, groupName, subjectName) => {
    const months = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentyabr','Oktyabr','Noyabr','Dekabr'];
    const now = new Date();
    let html = '';
    for (let i = 2; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const y = d.getFullYear(), m = d.getMonth();
      const monthStr = y + '-' + String(m + 1).padStart(2, '0');
      const monthLabel = months[m] + ' ' + y;
      try {
        const scheds = await G('/schedule/group/' + groupId + '?month=' + monthStr);
        if (!scheds.length) {
          html += `<div style="margin-bottom:16px;"><div class="st">${monthLabel}</div><div style="font-size:13px;color:#D1D5DB;padding:4px 0;">Dars yo'q</div></div>`;
          continue;
        }
        const atts = await G('/attendance/student/' + studentId + '?groupId=' + groupId + '&month=' + monthStr);
        const attMap = {};
        (atts || []).forEach(a => { attMap[a.scheduleId] = { isPresent: a.isPresent }; });
        let present = 0, absent = 0;
        const rows = scheds.map(sch => {
          const dt = new Date(sch.lessonDate);
          const ds = String(dt.getDate()).padStart(2,'0') + '.' + String(dt.getMonth()+1).padStart(2,'0');
          const att = attMap[sch.id];
          let ico, color;
          if (!att) { ico = ICO.dash; color = '#D1D5DB'; }
          else if (att.isPresent) { ico = ICO.check; color = '#10B981'; present++; }
          else { ico = ICO.x; color = '#EF4444'; absent++; }
          return `<div style="display:flex;justify-content:space-between;align-items:center;
                              padding:8px 0;border-bottom:1px solid #F5F7FB;">
            <span style="font-size:13px;color:#525B7A;font-family:${FONT};">${ds} ${sch.startTime}</span>
            <span style="display:flex;align-items:center;">${ico}</span>
          </div>`;
        }).join('');
        const total = present + absent;
        const pct = total > 0 ? Math.round(present / total * 100) : 0;
        html += `<div style="margin-bottom:20px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div class="st" style="margin:0;">${monthLabel}</div>
            <span style="font-size:13px;font-weight:700;color:${pct>=75?'#10B981':pct>=50?'#F59E0B':'#EF4444'};font-family:${FONT};">
              ${pct}% (${present}/${total})
            </span>
          </div>
          <div style="height:5px;background:#F3F4F6;border-radius:3px;overflow:hidden;margin-bottom:10px;">
            <div style="width:${pct}%;height:100%;background:${pct>=75?'#10B981':pct>=50?'#F59E0B':'#EF4444'};border-radius:3px;"></div>
          </div>
          ${rows}
        </div>`;
      } catch(e) {
        html += `<div style="margin-bottom:16px;"><div class="st">${monthLabel}</div><div style="font-size:13px;color:#EF4444;">Xatolik</div></div>`;
      }
    }
    openModal(groupName + ' — Davomat', `<div style="font-size:13px;color:#8A93AD;margin-bottom:12px;font-family:${FONT};">${subjectName}</div>${html}`);
  };

  // ── Narx tarixi ──────────────────────────────────────────────────
  window.showPriceHistory = async (studentId, studentName) => {
    const hist = await G(`/students/${studentId}/price-history`);
    const months = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentyabr','Oktyabr','Noyabr','Dekabr'];

    function mLbl(my) {
      if (!my) return '—';
      const [y, m] = my.split('-');
      return months[parseInt(m) - 1] + ' ' + y;
    }

    let html = '';
    if (!hist.length) {
      html = `<div style="text-align:center;padding:24px;color:#8A93AD;font-family:${FONT};">Narx tarixi yo'q</div>`;
    } else {
      hist.forEach(g => {
        if (!g.months.length) return;
        html += `
          <div style="margin-bottom:16px;">
            <div class="st">${g.groupName} — ${g.subjectName}</div>
            <div style="background:#fff;border-radius:14px;border:1.5px solid #EAEDF3;overflow:hidden;">
              ${g.months.map((m, i) => {
                const bg = i % 2 === 0 ? '#fff' : '#FAFBFD';
                const diffColor = m.diff >= 0 ? '#10B981' : '#EF4444';
                return `
                  <div style="display:flex;align-items:center;padding:10px 14px;
                              border-bottom:1px solid #F2F4F8;background:${bg};">
                    <div style="width:28px;height:28px;border-radius:8px;background:#EAF0FF;
                                display:flex;align-items:center;justify-content:center;
                                margin-right:10px;flex-shrink:0;">
                      ${ICO.clock.replace('stroke="currentColor"','stroke="#2D5BFF"')}
                    </div>
                    <div style="flex:1;font-family:${FONT};">
                      <div style="font-size:13px;font-weight:700;color:#0B1437;">${mLbl(m.month)}</div>
                      <div style="font-size:11px;color:#8A93AD;margin-top:1px;">
                        Narx: ${Number(m.price).toLocaleString('ru-RU')} so'm
                      </div>
                    </div>
                    <div style="text-align:right;font-family:${FONT};">
                      <div style="font-size:13px;font-weight:700;color:#10B981;">
                        ${Number(m.paid).toLocaleString('ru-RU')} so'm
                      </div>
                      <div style="font-size:11px;font-weight:600;color:${diffColor};">
                        ${m.diff >= 0 ? '+' : ''}${Number(m.diff).toLocaleString('ru-RU')}
                      </div>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>`;
      });
    }

    openModal(`${studentName} — Narx tarixi`, html);
  };

  // ── O'quvchi profili ─────────────────────────────────────────────
  window.openStudent = async id => {
    const s = await G(`/students/${id}/profile`);
    const a = s.applicant;
    const edu = { school: 'Maktab', college: 'Kollej', adult: 'Katta yosh' }[a.educationType];
    const bal = s.balanceInfo;
    const balColor = bal?.balance >= 0 ? '#10B981' : '#EF4444';
    const balBg    = bal?.balance >= 0 ? '#E6F8F0' : '#FCEDEC';
    const balStr   = bal ? ((bal.balance >= 0 ? '+' : '') + Number(bal.balance).toLocaleString('ru-RU') + " so'm") : '—';

    openModal(`${a.firstName} ${a.lastName}`, `
      <!-- Shaxsiy ma'lumotlar -->
      <div style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F2F4F8;">
          <span style="color:#8A93AD;font-size:14px;font-family:${FONT};">O'qish joyi</span>
          <b style="font-family:${FONT};">${edu}${a.grade ? ' · ' + a.grade + '-sinf' : ''}</b>
        </div>
        ${a.phoneSelf ? `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F2F4F8;"><span style="color:#8A93AD;font-size:14px;font-family:${FONT};">O'zi</span><b style="font-family:${FONT};">${a.phoneSelf}</b></div>` : ''}
        ${a.phoneFather ? `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F2F4F8;"><span style="color:#8A93AD;font-size:14px;font-family:${FONT};">Otasi</span><b style="font-family:${FONT};">${a.phoneFather}</b></div>` : ''}
        ${a.phoneMother ? `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F2F4F8;"><span style="color:#8A93AD;font-size:14px;font-family:${FONT};">Onasi</span><b style="font-family:${FONT};">${a.phoneMother}</b></div>` : ''}
      </div>

      <!-- Balans -->
      <div style="display:flex;align-items:center;justify-content:space-between;
                  background:${balBg};border-radius:14px;padding:12px 14px;margin-bottom:16px;
                  ${bal?.balance < 0 ? 'border:1.5px solid #FECACA;' : ''}">
        <div style="display:flex;align-items:center;gap:8px;font-family:${FONT};">
          ${ICO.wallet.replace('stroke="currentColor"',`stroke="${balColor}"`)}
          <span style="font-size:13px;font-weight:700;color:${balColor};">Joriy Balans</span>
        </div>
        <div style="font-size:16px;font-weight:800;color:${balColor};font-family:${FONT};">${balStr}</div>
      </div>
      ${bal?.balance < 0 ? `
      <div style="background:#FCEDEC;border-radius:12px;padding:10px 14px;margin-bottom:12px;
                  border:1px solid #FECACA;font-size:12px;font-weight:700;color:#EF4444;
                  font-family:${FONT};">
        Balans minus! O'quvchi ${Number(Math.abs(bal.balance)).toLocaleString('ru-RU')} so'm qarzdor.
      </div>` : ''}

      <!-- Guruhlar -->
      <div class="st">GURUHLAR</div>
      <div style="margin-bottom:16px;">
        ${s.groupStudents.map(gs => `
          <div style="display:flex;justify-content:space-between;align-items:center;
                      padding:10px 0;border-bottom:1px solid #F2F4F8;">
            <div>
              <div style="font-size:14px;font-weight:700;font-family:${FONT};">${gs.group.name}</div>
              <div style="font-size:12px;color:#8A93AD;font-family:${FONT};">${gs.group.subject.name}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:11px;color:#B5BDD2;font-family:${FONT};">${new Date(gs.joinedAt).toLocaleDateString('uz-UZ')}</div>
              <div style="font-size:11px;font-weight:700;color:${gs.status === 'active' ? '#10B981' : '#EF4444'};font-family:${FONT};">
                ${gs.status === 'active' ? 'Faol' : 'Arxiv'}
              </div>
            </div>
          </div>`).join('')}
      </div>

      <!-- Davomat -->
      <div class="st">DAVOMAT (oxirgi 3 oy)</div>
      <div style="margin-bottom:12px;">
        ${s.attendanceStats.filter(a => a.total > 0).length === 0
          ? `<div style="color:#8A93AD;font-size:14px;text-align:center;padding:12px;font-family:${FONT};">Davomat ma'lumoti yo'q</div>`
          : s.attendanceStats.filter(a => a.total > 0).map(a => `
            <div style="padding:10px 0;border-bottom:1px solid #F2F4F8;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                <span style="font-size:14px;font-weight:700;font-family:${FONT};">${a.monthLabel}</span>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-size:13px;font-weight:700;color:${a.percent>=75?'#10B981':a.percent>=50?'#F59E0B':'#EF4444'};font-family:${FONT};">${a.percent}%</span>
                  <span style="font-size:12px;color:#8A93AD;font-family:${FONT};">${a.present}/${a.total} dars</span>
                </div>
              </div>
              <div style="height:5px;background:#F3F4F6;border-radius:3px;overflow:hidden;">
                <div style="width:${a.percent}%;height:100%;background:${a.percent>=75?'#10B981':a.percent>=50?'#F59E0B':'#EF4444'};border-radius:3px;"></div>
              </div>
              ${a.absentList?.length > 0 ? `<div style="margin-top:5px;font-size:11px;color:#EF4444;font-family:${FONT};">Kelmagan: ${a.absentList.join(', ')}</div>` : ''}
            </div>`).join('')}
      </div>

      <!-- Davomat jadvali tugmalar -->
      <div style="margin-bottom:16px;">
        ${s.groupStudents.filter(gs => gs.status === 'active').map(gs => `
          <button onclick="showAttJadval(${s.id},${gs.groupId},'${gs.group.name}','${gs.group.subject.name}')"
            style="width:100%;text-align:left;padding:10px 14px;border-radius:12px;
                   border:1.5px solid #EAEDF3;background:#F8F9FC;cursor:pointer;
                   font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between;
                   align-items:center;font-family:${FONT};">
            <span style="display:flex;align-items:center;gap:7px;">
              ${ICO.tag.replace('stroke="currentColor"','stroke="#525B7A"')} ${gs.group.name} — ${gs.group.subject.name}
            </span>
            <span style="color:#2D5BFF;font-weight:700;">Jadval →</span>
          </button>`).join('')}
      </div>

      <!-- Narx tarixi tugmasi -->
      <button onclick="showPriceHistory(${s.id}, '${a.firstName} ${a.lastName}')"
        style="width:100%;padding:11px;border-radius:12px;border:1.5px solid #EAEDF3;
               background:#fff;font-size:13px;font-weight:700;cursor:pointer;
               font-family:${FONT};display:flex;align-items:center;justify-content:center;
               gap:7px;color:#525B7A;margin-bottom:12px;"
        onmouseenter="this.style.background='#EAF0FF';this.style.borderColor='#2D5BFF';this.style.color='#2D5BFF';"
        onmouseleave="this.style.background='#fff';this.style.borderColor='#EAEDF3';this.style.color='#525B7A';">
        ${ICO.clock.replace('stroke="currentColor"','stroke="currentColor"')} Narx va To'lovlar tarixi
      </button>

      <!-- To'lovlar -->
      <div class="st">TO'LOVLAR TARIXI (oxirgi 10)</div>
      <div style="margin-bottom:16px;">
        ${s.payments.length === 0
          ? `<div style="color:#8A93AD;font-size:14px;text-align:center;padding:12px;font-family:${FONT};">To'lovlar yo'q</div>`
          : s.payments.slice(0, 10).map(p => `
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F2F4F8;">
              <div>
                <div style="font-size:14px;font-weight:700;font-family:${FONT};">${p.group?.subject?.name || ''} — ${(typeof mLabel === 'function') ? mLabel(p.monthYear) : p.monthYear}</div>
                <div style="font-size:12px;color:#8A93AD;font-family:${FONT};">${new Date(p.createdAt).toLocaleDateString('uz-UZ')}</div>
              </div>
              <div style="text-align:right;">
                <div style="font-weight:700;color:#2D5BFF;font-family:${FONT};">${Number(p.amount).toLocaleString('ru-RU')} so'm</div>
                <div style="font-size:11px;color:#8A93AD;font-family:${FONT};">${p.paymentType === 'cash' ? 'Naqd' : 'Karta'}</div>
              </div>
            </div>`).join('')}
      </div>

      <!-- Arxivlash tugmasi (O'chirish emas!) -->
      <div style="border-top:1.5px solid #EAEDF3;padding-top:14px;margin-top:4px;">
        <button onclick="archiveStudent(${s.id}, '${a.firstName} ${a.lastName}')"
          style="width:100%;padding:12px;border-radius:14px;border:1.5px solid #FECACA;
                 background:#FCEDEC;color:#EF4444;font-size:14px;font-weight:700;cursor:pointer;
                 font-family:${FONT};display:flex;align-items:center;justify-content:center;gap:7px;">

    </button>
    ${staff.length===0?emHtml("Hodimlar yo'q"):`<div class="card" style="padding:0;overflow:hidden">${staff.map(s=>`
      <div class="li" onclick='openSF(${JSON.stringify(s).replace(/"/g,"&quot;")},${JSON.stringify(subs).replace(/"/g,"&quot;")})'>
        <div class="lic" style="background:${s.role==='teacher'?'#dbeafe':'#dcfce7'}">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${s.role==='teacher'?'#1d4ed8':'#15803d'}" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div style="flex:1"><div style="font-size:15px;font-weight:500">${s.firstName} ${s.lastName}</div>
        <div style="font-size:12px;color:#9ca3af">${s.role==='teacher'?"O'qituvchi":'Qabulxona'}${s.subject?' · '+s.subject:''}${s.phone?' · '+s.phone:''}</div></div>
        <span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:${s.role==='teacher'?'#dbeafe':'#dcfce7'};color:${s.role==='teacher'?'#1d4ed8':'#15803d'}">${s.role==='teacher'?"O'qituvchi":'Qabulxona'}</span>
      </div>`).join('')}</div>`}`;
  }
  window.openSF=(data,subs)=>{
    if(typeof subs==='string')subs=JSON.parse(subs); if(data&&typeof data==='string')data=JSON.parse(data);
    const isEdit=!!data;
    openModal(isEdit?'Hodimni tahrirlash':"Hodim qo'shish",`
      ${!isEdit?`<div class="ig"><label class="il">Telegram ID</label><input id="sf_tid" class="inp" placeholder="123456789"/></div>`:''}
      <div class="ig"><label class="il">Rol</label><select id="sf_role" class="inp" onchange="sfRC()">
        <option value="teacher" ${data?.role==='teacher'?'selected':''}>O'qituvchi</option>
        <option value="receptionist" ${data?.role==='receptionist'?'selected':''}>Qabulxona</option>
      </select></div>
      <div class="ig"><label class="il">Ismi</label><input id="sf_fn" class="inp" value="${data?.firstName||''}"/></div>
      <div class="ig"><label class="il">Familyasi</label><input id="sf_ln" class="inp" value="${data?.lastName||''}"/></div>
      <div class="ig"><label class="il">Telefon</label><input id="sf_ph" class="inp" placeholder="+998..." value="${data?.phone||''}"/></div>
      <div id="sf_sd" class="ig"><label class="il">Fan</label><select id="sf_sub" class="inp">${subs.map(s=>`<option value="${s.name}" ${data?.subject===s.name?'selected':''}>${s.name}</option>`).join('')}</select></div>
      <button class="btn bp" onclick="saveSF(${isEdit?data.id:'null'})">✓ Saqlash</button>`);
    sfRC();
  };
  window.sfRC=()=>{ const d=document.getElementById('sf_sd'); const r=document.getElementById('sf_role')?.value; if(d) d.style.display=r==='teacher'?'block':'none'; };
  window.saveSF=async id=>{
    const body={role:document.getElementById('sf_role').value,firstName:document.getElementById('sf_fn').value,lastName:document.getElementById('sf_ln').value,phone:document.getElementById('sf_ph').value,subject:document.getElementById('sf_sub')?.value||''};
    if(!id) body.telegramId=document.getElementById('sf_tid').value;
    try{ if(id) await U(`/staff/${id}`,body); else await P('/staff',body); closeModal(); toast('✅ Saqlandi'); load(); }
    catch(e){ toast('❌ '+e.message); }
  };
  load();
}



// ============ SCHEDULE ============
async function rSchedule(el) {

  // ── Ranglar va yordamchilar ──────────────────────────────────────────
  const SLOT_COLORS = [
    { key: 1, main: '#2D5BFF', soft: '#EAF0FF', label: '1-Slot', cls: 'sel-1' },
    { key: 2, main: '#10B981', soft: '#E6F8F0', label: '2-Slot', cls: 'sel-2' },
    { key: 3, main: '#F59E0B', soft: '#FEF4E0', label: '3-Slot', cls: 'sel-3' },
  ];
  const DAY_UZ  = ['Du', 'Se', 'Ch', 'Pa', 'Ju', 'Sh', 'Ya'];
  const MON_UZ  = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentyabr','Oktyabr','Noyabr','Dekabr'];
  const FONT    = "'Plus Jakarta Sans','Inter',system-ui,sans-serif";

  // ── Inline loader ────────────────────────────────────────────────────
  function showLoader() { el.innerHTML = ldHtml ? ldHtml() : '<div style="padding:48px;text-align:center;color:#8A93AD">Yuklanmoqda...</div>'; }

  // ── Orqaga tugmasi ───────────────────────────────────────────────────
  // nav() funksiyasi mavjud: u curPage ni o'zgartiradi va rSchedule ni chaqiradi.
  // Sub-ko'rinishlardan orqaga qaytish uchun rSchedule(el) ni qayta chaqiramiz —
  // bu loadToday() ni ishga tushiradi. Navigatsiya holati saqlanadi.
  function backBtn(label) {
    return `<button onclick="rSchedule(document.getElementById('content'))"
      style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;
             border-radius:12px;border:1.5px solid #EAEDF3;background:#fff;
             font-size:13px;font-weight:700;cursor:pointer;color:#525B7A;
             font-family:${FONT};margin-bottom:16px;transition:all .15s;"
      onmouseenter="this.style.background='#F5F7FB';this.style.borderColor='#2D5BFF';this.style.color='#2D5BFF';"
      onmouseleave="this.style.background='#fff';this.style.borderColor='#EAEDF3';this.style.color='#525B7A';">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      ${label || 'Orqaga'}
    </button>`;
  }

  // ── Hozirgi sanani YYYY-MM-DD formatda qaytaradi (local) ────────────
  function todayStr() {
    const n = new Date();
    return n.getFullYear() + '-'
      + String(n.getMonth() + 1).padStart(2, '0') + '-'
      + String(n.getDate()).padStart(2, '0');
  }

  // ════════════════════════════════════════════════════════════════════
  // 1. ASOSIY KO'RINISH — Bugungi darslar
  // ════════════════════════════════════════════════════════════════════
  async function loadToday() {
    showLoader();
    try {
      const today = await G('/schedule/today');
      const td = todayStr();
      const [y, m, d] = td.split('-');
      const dateLabel = `${d}-${MON_UZ[parseInt(m) - 1]}, ${DAY_UZ[new Date(td).getDay() === 0 ? 6 : new Date(td).getDay() - 1]}`;

      const todayHtml = today.length === 0
        ? `<div style="background:#F8F9FC;border-radius:16px;padding:20px;text-align:center;
                color:#8A93AD;font-size:13px;font-family:${FONT};margin-bottom:16px;">
            Bugun dars yo'q
           </div>`
        : `<div class="sch-card" style="margin-bottom:16px;">${
            today.map((s, i) => {
              const sc = SLOT_COLORS[i % 3];
              const teacherName = (s.group.teacher?.firstName || '') + ' ' + (s.group.teacher?.lastName || '');
              return `
                <div class="sch-day-row" style="cursor:default;">
                  <div style="width:4px;align-self:stretch;border-radius:4px;background:${sc.main};flex-shrink:0;"></div>
                  <div style="width:42px;height:42px;border-radius:13px;background:${sc.soft};
                              display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${sc.main}" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="4" width="18" height="18" rx="2"/>
                      <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                      <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                  </div>
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:14px;font-weight:700;color:#0B1437;font-family:${FONT};">
                      ${s.group.name}
                    </div>
                    <div style="font-size:12px;color:#8A93AD;font-family:${FONT};margin-top:2px;">
                      ${s.group.subject.name}${teacherName.trim() ? ' · ' + teacherName.trim() : ''}
                    </div>
                  </div>
                  <div style="font-size:13px;font-weight:700;color:${sc.main};font-family:${FONT};white-space:nowrap;">
                    ${s.startTime}–${s.endTime}
                  </div>
                </div>`;
            }).join('')
          }</div>`;

      el.innerHTML = `
        <div style="padding:4px 0 16px;">
          <!-- Sarlavha -->
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
            <div style="width:38px;height:38px;border-radius:12px;background:#EAF0FF;
                        display:flex;align-items:center;justify-content:center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2D5BFF"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </div>
            <div>
              <div style="font-size:16px;font-weight:800;color:#0B1437;font-family:${FONT};">Bugungi Darslar</div>
              <div style="font-size:12px;color:#8A93AD;font-family:${FONT};">${dateLabel}</div>
            </div>
          </div>

          ${todayHtml}

          <!-- Amal tugmalari -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <button onclick="showWeekView()"
              style="padding:13px;border-radius:14px;border:1.5px solid #EAEDF3;
                     background:#fff;font-size:13px;font-weight:700;cursor:pointer;
                     font-family:${FONT};color:#525B7A;display:flex;align-items:center;
                     justify-content:center;gap:7px;transition:all .15s;"
              onmouseenter="this.style.borderColor='#2D5BFF';this.style.color='#2D5BFF';this.style.background='#EAF0FF';"
              onmouseleave="this.style.borderColor='#EAEDF3';this.style.color='#525B7A';this.style.background='#fff';">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              Haftalik jadval
            </button>
            <button onclick="showScheduleEditor(false)"
              style="padding:13px;border-radius:14px;border:none;
                     background:#2D5BFF;font-size:13px;font-weight:700;cursor:pointer;
                     font-family:${FONT};color:#fff;display:flex;align-items:center;
                     justify-content:center;gap:7px;transition:all .15s;
                     box-shadow:0 4px 12px rgba(45,91,255,.3);"
              onmouseenter="this.style.background='#1A3FCE';"
              onmouseleave="this.style.background='#2D5BFF';">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Jadval qo'shish / Tahrirlash
            </button>
          </div>
        </div>`;

      // Global funksiyalarni bog'laymiz
      window.showWeekView    = showWeekView;
      window.showScheduleEditor = showScheduleEditor;

    } catch (e) {
      el.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#8A93AD;font-family:${FONT};">
        Xatolik: ${e.message}
      </div>`;
    }
  }

  // ════════════════════════════════════════════════════════════════════
  // 2. HAFTALIK JADVAL KO'RINISHI
  // ════════════════════════════════════════════════════════════════════
  async function showWeekView() {
    showLoader();
    try {
      const week = await G('/schedule/week');

      // Slotlarni guruhlaymiz: har bir guruhga rang beramiz
      const groupColorMap = {};
      let colorIdx = 0;

      week.forEach(day => {
        day.schedules.forEach(s => {
          if (!groupColorMap[s.group.id]) {
            groupColorMap[s.group.id] = SLOT_COLORS[colorIdx % 3];
            colorIdx++;
          }
        });
      });

      const weekHtml = week.map(day => {
        const hasScheds = day.schedules.length > 0;
        const dateObj = new Date(day.date + 'T00:00:00');
        const dayLabel = `${day.day} — ${dateObj.getDate()}-${MON_UZ[dateObj.getMonth()]}`;

        if (!hasScheds) {
          return `
            <div class="sch-day-row" style="opacity:0.45;">
              <div class="sch-day-badge" style="background:#F3F4F6;color:#9CA3AF;">
                ${day.day}
              </div>
              <div style="font-size:13px;color:#D1D5DB;font-family:${FONT};padding:6px 0;">
                Dars yo'q
              </div>
            </div>`;
        }

        return `
          <div class="sch-day-row">
            <div>
              <div class="sch-day-badge" style="background:#EAF0FF;color:#2D5BFF;">
                ${day.day}
              </div>
              <div style="font-size:10px;color:#B5BDD2;font-family:${FONT};text-align:center;margin-top:4px;">
                ${dateObj.getDate()}-${MON_UZ[dateObj.getMonth()].slice(0,3)}
              </div>
            </div>
            <div style="flex:1;display:flex;flex-wrap:wrap;gap:6px;padding:2px 0;">
              ${day.schedules.map(s => {
                const sc = groupColorMap[s.group.id] || SLOT_COLORS[0];
                return `
                  <div style="display:flex;align-items:center;gap:8px;background:${sc.soft};
                              border-radius:12px;padding:8px 12px;border:1px solid ${sc.main}22;
                              flex:1;min-width:0;">
                    <div style="width:3px;height:32px;border-radius:2px;background:${sc.main};flex-shrink:0;"></div>
                    <div style="flex:1;min-width:0;">
                      <div style="font-size:13px;font-weight:700;color:#0B1437;font-family:${FONT};
                                  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                        ${s.group.name}
                      </div>
                      <div style="font-size:11px;color:${sc.main};font-weight:600;font-family:${FONT};">
                        ${s.startTime}–${s.endTime}
                      </div>
                    </div>
                  </div>`;
              }).join('')}
            </div>
          </div>`;
      }).join('');

      el.innerHTML = `
        <div style="padding:4px 0 16px;">
          ${backBtn('Bugungi darslar')}
          <div style="font-size:11px;font-weight:800;color:#8A93AD;letter-spacing:0.6px;
                      text-transform:uppercase;margin-bottom:10px;font-family:${FONT};">
            Haftalik Jadval
          </div>
          <div class="sch-card">${weekHtml}</div>
        </div>`;

    } catch (e) {
      el.innerHTML = backBtn() + `<div style="text-align:center;padding:40px;color:#8A93AD;">
        Xatolik: ${e.message}
      </div>`;
    }
  }

  // ════════════════════════════════════════════════════════════════════
  // 3. JADVAL QO'SHISH / TAHRIRLASH (Birlashtirilgan)
  // isEdit=false → "Jadval qo'shish" sarlavhasi
  // isEdit=true  → "Jadval tahrirlash" sarlavhasi
  // Funksionallik bir xil: fan → guruh → kalendar (multi-slot)
  // ════════════════════════════════════════════════════════════════════
  async function showScheduleEditor(isEdit) {
    showLoader();
    try {
      const subs = await G('/subjects');

      el.innerHTML = `
        <div style="padding:4px 0 16px;">
          ${backBtn('Jadval bo\'limi')}

          <div style="font-size:16px;font-weight:800;color:#0B1437;font-family:${FONT};margin-bottom:18px;">
            ${isEdit ? 'Jadval Tahrirlash' : "Jadval Qo'shish / Tahrirlash"}
          </div>

          <!-- Fan tanlash -->
          <div class="ig">
            <label class="il">Fan</label>
            <select id="schSub" class="inp" onchange="schLoadGroups()">
              <option value="">Fan tanlang</option>
              ${subs.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
            </select>
          </div>

          <!-- Guruh tanlash (yashirin) -->
          <div id="schGroupSec" style="display:none;" class="ig">
            <label class="il">Guruh</label>
            <select id="schGroup" class="inp" onchange="schLoadCalendar()">
              <option value="">Guruh tanlang</option>
            </select>
          </div>

          <!-- Kalendar (yashirin) -->
          <div id="schCalArea"></div>
        </div>`;

      // ── Fan tanlanganda guruhlarni yuklash ─────────────────────────
      window.schLoadGroups = async () => {
        const sid = document.getElementById('schSub').value;
        if (!sid) return;
        const groups = await G(`/groups?subjectId=${sid}`);
        const gSel = document.getElementById('schGroup');
        gSel.innerHTML = '<option value="">Guruh tanlang</option>'
          + groups.map(g => {
            const t = g.teacher
              ? `${g.teacher.firstName} ${g.teacher.lastName}`.trim()
              : '';
            return `<option value="${g.id}">${g.name}${t ? ' — ' + t : ''}</option>`;
          }).join('');
        document.getElementById('schGroupSec').style.display = 'block';
        document.getElementById('schCalArea').innerHTML = '';
      };

      // ── Guruh tanlanganda multi-slot kalendarni yuklash ──────────
      window.schLoadCalendar = async () => {
        const gid = document.getElementById('schGroup').value;
        if (!gid) return;
        await renderMultiSlotCalendar(gid, document.getElementById('schCalArea'));
      };

    } catch (e) {
      el.innerHTML = backBtn() + `<div style="text-align:center;padding:40px;color:#EF4444;">
        Xatolik: ${e.message}
      </div>`;
    }
  }

  // ════════════════════════════════════════════════════════════════════
  // 4. MULTI-SLOT KALENDAR
  //    Maksimal 3 ta slot (har biri alohida rang).
  //    Har slot uchun mustaqil kun tanlash + vaqt kiritish.
  //    Saqlashda barcha slotlar bitta POST da ketadi.
  // ════════════════════════════════════════════════════════════════════
  async function renderMultiSlotCalendar(gid, container) {
    container.innerHTML = ldHtml ? ldHtml() : '';

    // Joriy oy ma'lumotlarini olamiz
    const now    = new Date();
    let calYear  = now.getFullYear();
    let calMonth = now.getMonth(); // 0-indexed

    // Mavjud jadval — slot 1 bilan pre-fill qilamiz
    let existingSchedules = [];
    try {
      const m = `${calYear}-${String(calMonth + 1).padStart(2, '0')}`;
      existingSchedules = await G(`/schedule/group/${gid}?month=${m}`);
    } catch (_) {}

    // ── Slot holati ──────────────────────────────────────────────────
    // slots[0] = 1-slot ma'lumoti, slots[1] = 2-slot, slots[2] = 3-slot
    // { dates: Set<string>, startTime: string, endTime: string, active: bool }
    const slots = [
      {
        dates:     new Set(existingSchedules.map(s => s.lessonDate.slice(0, 10))),
        startTime: existingSchedules[0]?.startTime || '09:00',
        endTime:   existingSchedules[0]?.endTime   || '10:30',
        active:    true,
      },
      { dates: new Set(), startTime: '11:00', endTime: '12:30', active: false },
      { dates: new Set(), startTime: '14:00', endTime: '15:30', active: false },
    ];

    let activeSlot = 0; // qaysi slot tahrir qilinmoqda (0-indexed)

    // ── Kalendar chizish funksiyasi ───────────────────────────────────
    function drawCalendar() {
      const td       = todayStr();
      const dim      = new Date(calYear, calMonth + 1, 0).getDate();
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const offset   = firstDay === 0 ? 6 : firstDay - 1; // Du=0

      // Kunlar HTML
      let cellsHtml = '';
      for (let i = 0; i < offset; i++) cellsHtml += '<div></div>';

      for (let d = 1; d <= dim; d++) {
        const ds      = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isPast  = ds < td;
        const isToday = ds === td;

        // Qaysi slotlarda bu kun bor?
        const inSlots = slots.map((sl, idx) => sl.dates.has(ds) ? idx : -1).filter(x => x >= 0);

        // Asosiy CSS klassi
        let cls = 'cald';
        if (isPast) cls += ' past';
        if (isToday && inSlots.length === 0) cls += ' td';

        // Rangni asosiy tanlangan slotga qarab belgilaymiz
        let mainSlotIdx = inSlots.includes(activeSlot) ? activeSlot : (inSlots[0] ?? -1);
        if (mainSlotIdx >= 0) cls += ` sel-${mainSlotIdx + 1}`;

        // Bir nechta slotda bor bo'lsa dot ko'rsatamiz
        const dotsHtml = inSlots.length > 1
          ? `<div class="cald-dot">${inSlots.map(i => `<span style="background:${SLOT_COLORS[i].main};"></span>`).join('')}</div>`
          : '';

        cellsHtml += `
          <div class="${cls}" id="cd${ds.replace(/-/g, '')}"
               data-ds="${ds}" onclick="schToggleDay('${ds}')">
            ${d}${dotsHtml}
          </div>`;
      }

      // Aktiv slot ob'ekti
      const asl = slots[activeSlot];
      const sc  = SLOT_COLORS[activeSlot];

      // Slot tab tugmalari
      let slotTabsHtml = '';
      for (let i = 0; i < 3; i++) {
        const sl = slots[i];
        const sc2 = SLOT_COLORS[i];
        if (i < 2 || sl.active) {
          // Faol yoki birinchi 2 ta har doim ko'rinadi
          slotTabsHtml += `
            <div class="slot-tab ${i === activeSlot ? 'active-' + (i + 1) : 'inactive'}"
                 onclick="schSwitchSlot(${i})">
              <div style="font-size:11px;letter-spacing:0.3px;">${sc2.label}</div>
              <div style="font-size:10px;margin-top:2px;opacity:0.75;">
                ${sl.dates.size} kun
              </div>
              ${sl.active ? '' : '<div style="font-size:9px;opacity:0.5;">(bo\'sh)</div>'}
            </div>`;
        } else {
          // 3-slot faqat "+ Slot qo'shish" tugmasi sifatida
          slotTabsHtml += `
            <div class="slot-tab add-slot" onclick="schAddSlot(${i})">
              <div style="font-size:11px;">+ Slot</div>
              <div style="font-size:10px;opacity:0.6;margin-top:2px;">qo'shish</div>
            </div>`;
        }
      }

      container.innerHTML = `
        <!-- Slot tab paneli -->
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          ${slotTabsHtml}
        </div>

        <!-- Aktiv slot rangi haqida eslatma -->
        <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;
                    border-radius:12px;background:${sc.soft};border:1px solid ${sc.main}33;
                    margin-bottom:14px;font-family:${FONT};">
          <div style="width:12px;height:12px;border-radius:50%;background:${sc.main};flex-shrink:0;"></div>
          <div style="font-size:12px;font-weight:700;color:${sc.main};">
            ${sc.label} uchun kunlarni tanlang — ular ${['ko\'k', 'yashil', 'sariq'][activeSlot]} rangda belgilanadi
          </div>
        </div>

        <!-- Kalendar -->
        <div style="background:#fff;border-radius:18px;border:1.5px solid #EAEDF3;
                    padding:16px;margin-bottom:12px;">
          <!-- Oy navigatsiyasi -->
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <button id="schPrev"
              style="width:36px;height:36px;border-radius:50%;border:1.5px solid #EAEDF3;
                     background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#525B7A"
                   stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"/>
              </svg>
            </button>
            <div style="text-align:center;">
              <div style="font-weight:800;font-size:15px;color:#0B1437;font-family:${FONT};">
                ${MON_UZ[calMonth]} ${calYear}
              </div>
              <div id="schCntLbl"
                   style="font-size:12px;font-weight:700;color:${sc.main};margin-top:2px;font-family:${FONT};">
                ${asl.dates.size} kun tanlandi
              </div>
            </div>
            <button id="schNext"
              style="width:36px;height:36px;border-radius:50%;border:1.5px solid #EAEDF3;
                     background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#525B7A"
                   stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18l6-6-6-6"/>
              </svg>
            </button>
          </div>

          <!-- Hafta kunlari sarlavhasi -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px;">
            ${DAY_UZ.map(d => `<div style="text-align:center;font-size:11px;font-weight:700;
                                           color:#B5BDD2;font-family:${FONT};">${d}</div>`).join('')}
          </div>

          <!-- Kunlar -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
            ${cellsHtml}
          </div>
        </div>

        <!-- Du-Ju / Tozalash tugmalari -->
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <button onclick="schFillWeekdays()"
            style="flex:1;padding:10px;border-radius:12px;
                   border:1.5px solid ${sc.main};background:${sc.soft};
                   color:${sc.main};font-size:13px;font-weight:700;
                   cursor:pointer;font-family:${FONT};">
            Du–Ju kunlari
          </button>
          <button onclick="schClearMonth()"
            style="flex:1;padding:10px;border-radius:12px;
                   border:1.5px solid #FECACA;background:#FFF5F5;
                   color:#EF4444;font-size:13px;font-weight:700;
                   cursor:pointer;font-family:${FONT};">
            Bu oyni tozalash
          </button>
        </div>

        <!-- Aktiv slot vaqti -->
        <div style="background:#fff;border-radius:18px;border:1.5px solid #EAEDF3;
                    padding:16px;margin-bottom:16px;">
          <div style="font-size:11px;font-weight:800;color:#8A93AD;letter-spacing:0.6px;
                      text-transform:uppercase;margin-bottom:12px;font-family:${FONT};">
            ${sc.label} Vaqti
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div>
              <label class="il">Boshlanish</label>
              <input type="time" id="schSt${activeSlot}" class="inp"
                     value="${asl.startTime}"
                     onchange="schUpdateTime(${activeSlot},'start',this.value)"/>
            </div>
            <div>
              <label class="il">Tugash</label>
              <input type="time" id="schEn${activeSlot}" class="inp"
                     value="${asl.endTime}"
                     onchange="schUpdateTime(${activeSlot},'end',this.value)"/>
            </div>
          </div>
        </div>

        <!-- Saqlash tugmasi -->
        <button onclick="schSaveAll('${gid}')"
          style="width:100%;padding:14px;border-radius:14px;border:none;
                 background:#2D5BFF;color:#fff;font-size:15px;font-weight:700;
                 cursor:pointer;font-family:${FONT};
                 display:flex;align-items:center;justify-content:center;gap:8px;
                 box-shadow:0 4px 14px rgba(45,91,255,.35);transition:background .15s;"
          onmouseenter="this.style.background='#1A3FCE';"
          onmouseleave="this.style.background='#2D5BFF';">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Barcha Jadvalni Saqlash
        </button>

        <!-- Jami kun hisobi (qisqacha) -->
        <div style="text-align:center;padding:10px;font-size:12px;color:#8A93AD;font-family:${FONT};">
          ${slots.filter(s => s.active).map((s, i) => `${SLOT_COLORS[i].label}: ${s.dates.size} kun`).join(' · ')}
          · Jami: ${slots.reduce((acc, s) => acc + s.dates.size, 0)} kun
        </div>`;

      // ── Event handlerlar ─────────────────────────────────────────────
      document.getElementById('schPrev')?.addEventListener('click', () => {
        calMonth--;
        if (calMonth < 0) { calMonth = 11; calYear--; }
        loadMonthData();
      });
      document.getElementById('schNext')?.addEventListener('click', () => {
        calMonth++;
        if (calMonth > 11) { calMonth = 0; calYear++; }
        loadMonthData();
      });
    }

    // ── Oy o'zgarganda mavjud jadval ma'lumotlarini qayta yuklash ──────
    async function loadMonthData() {
      // Joriy slot uchun yangi oy ma'lumotini olamiz,
      // lekin faqat 1-slot uchun existing dates ni yangilaymiz
      try {
        const m = `${calYear}-${String(calMonth + 1).padStart(2, '0')}`;
        const ex = await G(`/schedule/group/${gid}?month=${m}`);
        if (activeSlot === 0 && slots[0].dates.size === 0) {
          ex.forEach(s => slots[0].dates.add(s.lessonDate.slice(0, 10)));
        }
      } catch (_) {}
      drawCalendar();
    }

    // ── Kun toggle ────────────────────────────────────────────────────
    window.schToggleDay = (ds) => {
      const sl = slots[activeSlot];
      if (sl.dates.has(ds)) {
        sl.dates.delete(ds);
      } else {
        sl.dates.add(ds);
      }
      // Counter yangilash (full redraw qilmasdan)
      const cntEl = document.getElementById('schCntLbl');
      if (cntEl) cntEl.textContent = `${sl.dates.size} kun tanlandi`;

      // Faqat shu kun cellini yangilash
      const cell = document.getElementById('cd' + ds.replace(/-/g, ''));
      if (cell) {
        // Barcha sel-* klasslarini olib tashlaymiz
        cell.classList.remove('sel', 'sel-1', 'sel-2', 'sel-3');

        // Qaysi slotlarda bor?
        const inSlots = slots.map((s, i) => s.dates.has(ds) ? i : -1).filter(x => x >= 0);
        if (inSlots.length > 0) {
          const mainIdx = inSlots.includes(activeSlot) ? activeSlot : inSlots[0];
          cell.classList.add(`sel-${mainIdx + 1}`);
        } else if (ds === todayStr()) {
          cell.classList.add('td');
        }

        // Dotlarni yangilash
        const oldDot = cell.querySelector('.cald-dot');
        if (oldDot) oldDot.remove();
        if (inSlots.length > 1) {
          const dotDiv = document.createElement('div');
          dotDiv.className = 'cald-dot';
          inSlots.forEach(i => {
            const sp = document.createElement('span');
            sp.style.background = SLOT_COLORS[i].main;
            dotDiv.appendChild(sp);
          });
          cell.appendChild(dotDiv);
        }
      }
    };

    // ── Slot almashtirish ─────────────────────────────────────────────
    window.schSwitchSlot = (idx) => {
      activeSlot = idx;
      drawCalendar();
    };

    // ── 3-slotni qo'shish ─────────────────────────────────────────────
    window.schAddSlot = (idx) => {
      slots[idx].active = true;
      activeSlot = idx;
      drawCalendar();
    };

    // ── Vaqt yangilash ────────────────────────────────────────────────
    window.schUpdateTime = (slotIdx, type, val) => {
      if (type === 'start') slots[slotIdx].startTime = val;
      else                  slots[slotIdx].endTime   = val;
    };

    // ── Du-Ju kunlari ─────────────────────────────────────────────────
    window.schFillWeekdays = () => {
      const td  = todayStr();
      const dim = new Date(calYear, calMonth + 1, 0).getDate();
      for (let d = 1; d <= dim; d++) {
        const ds  = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dow = new Date(ds).getDay();
        if (dow >= 1 && dow <= 5 && ds >= td) {
          slots[activeSlot].dates.add(ds);
        }
      }
      drawCalendar();
    };

    // ── Bu oyni tozalash ──────────────────────────────────────────────
    window.schClearMonth = () => {
      const prefix = `${calYear}-${String(calMonth + 1).padStart(2, '0')}`;
      slots[activeSlot].dates.forEach(ds => {
        if (ds.startsWith(prefix)) slots[activeSlot].dates.delete(ds);
      });
      drawCalendar();
    };

    // ── BARCHA SLOTLARNI SAQLASH ───────────────────────────────────────
    // Har bir slot uchun alohida POST chaqiriladi.
    // Slot 1 odatdagi vaqt bilan, Slot 2 va 3 o'z vaqti bilan.
    window.schSaveAll = async (groupId) => {
      const activeSlots = slots.filter(s => s.active && s.dates.size > 0);
      if (activeSlots.length === 0) {
        toast('Kamida bitta slot uchun kun tanlang');
        return;
      }

      const saveBtn = container.querySelector('button[onclick^="schSaveAll"]');
      if (saveBtn) {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saqlanmoqda...';
        saveBtn.style.opacity = '0.7';
      }

      let savedCount = 0;
      let errorMsg = '';

      for (let i = 0; i < slots.length; i++) {
        const sl = slots[i];
        if (!sl.active || sl.dates.size === 0) continue;

        const dates = [...sl.dates].sort();
        try {
          await P(`/schedule/group/${groupId}`, {
            dates,
            startTime: sl.startTime,
            endTime:   sl.endTime,
          });
          savedCount += dates.length;
        } catch (e) {
          errorMsg = `${SLOT_COLORS[i].label}: ${e.message}`;
        }
      }

      if (errorMsg) {
        toast(`✗ Xatolik — ${errorMsg}`);
      } else {
        toast(`✓ ${savedCount} ta dars saqlandi`);
        setTimeout(() => rSchedule(document.getElementById('content')), 700);
      }
    };

    // ── Birinchi chizish ──────────────────────────────────────────────
    drawCalendar();
  }

  // ════════════════════════════════════════════════════════════════════
  // ISHGA TUSHIRISH
  // ════════════════════════════════════════════════════════════════════
  loadToday();
}
