                ${ICO.subject.replace('stroke="currentColor"','stroke="#2D5BFF"').replace('width="18" height="18"','width="16" height="16"')}
              </div>
              <div style="flex:1;font-weight:700;color:#0B1437;font-family:${FONT};">${s.name}</div>
              <button class="btn bd bsm" onclick="delSub(${s.id})"
                style="display:flex;align-items:center;gap:4px;">
                ${ICO.trash.replace('stroke="currentColor"','stroke="#EF4444"')} O'chirish
              </button>
            </div>`).join('')}
      </div>`;

    // ── Event handlers ───────────────────────────────────────────────
    window.saveSettings = async () => {
      try {
        await U('/settings', {
          report_channel_id: document.getElementById('set_report').value,
          attendance_channel_id: document.getElementById('set_att').value,
          applicant_channel_id: document.getElementById('set_app').value
        });
        toast('✓ Kanal sozlamalari saqlandi');
      } catch(e) { toast('✗ ' + e.message); }
    };

    // Sanani preview yangilash
    document.getElementById('set_deduct_day')?.addEventListener('input', e => {
      const v = parseInt(e.target.value);
      const prev = document.getElementById('deductPreview');
      if (prev) {
        if (v >= 1 && v <= 28) {
          prev.innerHTML = `Har oyning <b style="color:#2D5BFF;">${v}-sanasida</b> o'quvchilar balansi avtomatik yechiladi`;
        } else if (e.target.value === '') {
          prev.textContent = 'Sana kiritilmagan — avtomatik yechish o\'chirilgan';
        } else {
          prev.innerHTML = `<span style="color:#EF4444;">Sana 1–28 oralig'ida bo'lishi kerak</span>`;
        }
      }
    });

    window.saveDeductDay = async () => {
      const v = document.getElementById('set_deduct_day')?.value;
      const day = parseInt(v);
      if (!v) {
        // Sana o'chirildi
        await U('/settings', { monthly_deduction_day: '' });
        toast('✓ Avtomatik yechish o\'chirildi');
        return;
      }
      if (isNaN(day) || day < 1 || day > 28) return toast('1–28 oralig\'idagi son kiriting');
      try {
        await U('/settings', { monthly_deduction_day: String(day) });
        toast(`✓ Har oyning ${day}-sanasida avtomatik yechiladi`);
        load();
      } catch(e) { toast('✗ ' + e.message); }
    };

    window.runDeductNow = () => {
      openModal('Hozir ishlatish', `
        <div style="font-size:14px;color:#525B7A;margin-bottom:16px;font-family:${FONT};line-height:1.6;">
          Bu tugma barcha faol o'quvchilar balanslari uchun joriy oyning narxini
          <b>hozir</b> yechadi. Agar oylik narx yechish sanasi belgilangan bo'lsa ham,
          bu qo'lda ishlatish uchun.
        </div>
        <div style="background:#FEF4E0;border-radius:12px;padding:12px;margin-bottom:16px;
                    border:1px solid #FCD34D;font-size:12px;color:#92400E;font-family:${FONT};">
          ⚠️ Bu amal qaytarib bo'lmaydi. Davom etishga ishonchingiz komilmi?
        </div>
        <div style="display:flex;gap:10px;">
          <button onclick="closeModal()"
            style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #EAEDF3;
                   background:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:${FONT};">
            Bekor
          </button>
          <button id="runDeductBtn" onclick="doRunDeduct()"
            style="flex:2;padding:12px;border-radius:12px;border:none;background:#2D5BFF;
                   color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:${FONT};">
            Ha, hozir ishlatish
          </button>
        </div>`);
    };

    window.doRunDeduct = async () => {
      const btn = document.getElementById('runDeductBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Ishlanmoqda...'; }
      try {
        const r = await P('/settings/run-deduction', {});
        closeModal();
        toast(`✓ ${r.processed || 0} ta balans yechildi`);
      } catch(e) {
        toast('✗ ' + e.message);
        if (btn) { btn.disabled = false; btn.textContent = 'Ha, hozir ishlatish'; }
      }
    };

    window.addSub = () => openModal("Fan qo'shish", `
      <div class="ig"><label class="il">Fan nomi</label>
        <input id="sn" class="inp" placeholder="Matematika" style="font-family:${FONT};"/>
      </div>
      <button class="btn bp" onclick="saveSb()" style="font-family:${FONT};">
        ${ICO.save} Saqlash
      </button>`);

    window.saveSb = async () => {
      const n = document.getElementById('sn')?.value.trim();
      if (!n) return toast('Fan nomi kerak');
      try { await P('/subjects', { name: n }); closeModal(); toast('✓ Saqlandi'); load(); }
      catch(e) { toast('✗ ' + e.message); }
    };

    window.delSub = async id => {
      if (!confirm('O\'chirishni tasdiqlaysizmi?')) return;
      try { await D(`/subjects/${id}`); toast('O\'chirildi'); load(); }
      catch(e) { toast('✗ ' + e.message); }
    };
  }

  load();
}


// ============ DEBTORS ============
async function rDebtors(el) {
  const FONT = "'Plus Jakarta Sans','Inter',system-ui,sans-serif";

  // Oylar (hozirdan 3 oy orqaga + 1 oy oldinga)
  function getMonths() {
    const now = new Date(); const res = [];
    for (let i = -3; i <= 1; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      res.push(k);
    }
    return res;
  }
  const months = getMonths();
  let selMonth = (typeof nowMonth === 'function') ? nowMonth() : months[months.length - 2];
  let lastData = [];

  // ── SVG ikonlar ────────────────────────────────────────────────────
  const ICO = {
    alert: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    send: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
    sendAll: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`,
    ok: `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
    phone: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.44 2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.84a16 16 0 0 0 6 6l.86-.86a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
    tag: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
    tg: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2.5L2 9.5l7 2m12.5-9-7.5 19-4.5-7.5m12-11.5L9 11.5m0 0v7l3-3"/></svg>`,
  };

  function fmtSum(n) {
    if (n === null || n === undefined) return '—';
    return Number(n).toLocaleString('ru-RU') + " so'm";
  }

  // ── Asosiy layout ─────────────────────────────────────────────────
  function drawMain() {
    const monthHtml = months.map(m => `
      <button class="mpb${m === selMonth ? ' on' : ''}" onclick="debtSelM('${m}')"
        style="flex-shrink:0;padding:8px 16px;border-radius:22px;font-weight:700;font-family:${FONT};">
        ${(typeof mLabel === 'function') ? mLabel(m) : m}
      </button>`).join('');

    el.innerHTML = `
      <div style="margin-bottom:14px;">
        <div style="font-size:11px;font-weight:800;color:#8A93AD;letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px;font-family:${FONT};">
          Oy tanlang
        </div>
        <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;">${monthHtml}</div>
      </div>

      <button onclick="debtSearch()"
        style="width:100%;padding:13px;border-radius:14px;border:none;background:#2D5BFF;
               color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:${FONT};
               display:flex;align-items:center;justify-content:center;gap:8px;
               box-shadow:0 4px 12px rgba(45,91,255,.3);margin-bottom:16px;"
        onmouseenter="this.style.background='#1A3FCE';"
        onmouseleave="this.style.background='#2D5BFF';">
        ${ICO.alert.replace('currentColor','#fff').replace('width="20" height="20"','width="18" height="18"')}
        Ko'rish
      </button>

      <div id="debtResult"></div>`;

    window.debtSelM = m => {
      selMonth = m;
      document.querySelectorAll('.mpb').forEach(b => {
        const bm = b.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
        if (bm) {
          b.classList.toggle('on', bm === m);
          b.style.background = bm === m ? '#2D5BFF' : '#fff';
          b.style.color = bm === m ? '#fff' : '#525B7A';
          b.style.borderColor = bm === m ? '#2D5BFF' : '#EAEDF3';
        }
      });
    };

    window.debtSearch = async () => {
      const res = document.getElementById('debtResult');
      res.innerHTML = (typeof ldHtml === 'function') ? ldHtml() : 'Yuklanmoqda...';
      try {
        const data = await G(`/debtors?monthYear=${selMonth}`);
        lastData = data;
        renderResults(data, res);
      } catch(e) {
        res.innerHTML = `<div style="text-align:center;padding:32px;color:#EF4444;font-family:${FONT};">Xatolik: ${e.message}</div>`;
      }
    };
  }

  // ── Natijalarni render qilish ─────────────────────────────────────
  function renderResults(data, res) {
    const mLbl = (typeof mLabel === 'function') ? mLabel(selMonth) : selMonth;

    if (!data.length) {
      res.innerHTML = `
        <div style="text-align:center;padding:48px 20px;font-family:${FONT};">
          ${ICO.ok}
          <div style="font-size:16px;font-weight:700;color:#10B981;margin-top:14px;">Qarzdorlar yo'q!</div>
          <div style="font-size:13px;color:#8A93AD;margin-top:6px;">${mLbl} uchun hamma to'lov qilgan</div>
        </div>`;
      return;
    }

    // Jami qarzdorlar
    const totalStudents = data.reduce((s, g) => s + g.students.length, 0);
    const totalDebt = data.reduce((s, g) => s + (g.totalDebt || 0), 0);

    let html = `
      <!-- Umumiy statistika -->
      <div style="display:flex;gap:10px;margin-bottom:16px;">
        <div style="flex:1;background:#FCEDEC;border-radius:14px;padding:12px 14px;text-align:center;">
          <div style="font-size:22px;font-weight:800;color:#EF4444;font-family:${FONT};">${totalStudents}</div>
          <div style="font-size:11px;color:#EF4444;font-weight:700;margin-top:2px;">Qarzdor</div>
        </div>
        <div style="flex:1;background:#FEF4E0;border-radius:14px;padding:12px 14px;text-align:center;">
          <div style="font-size:22px;font-weight:800;color:#F59E0B;font-family:${FONT};">${data.length}</div>
          <div style="font-size:11px;color:#F59E0B;font-weight:700;margin-top:2px;">Guruh</div>
        </div>
        ${totalDebt > 0 ? `
        <div style="flex:1;background:#F0EAFE;border-radius:14px;padding:12px 14px;text-align:center;">
          <div style="font-size:15px;font-weight:800;color:#8056F5;font-family:${FONT};line-height:1.2;">${fmtSum(totalDebt)}</div>
          <div style="font-size:11px;color:#8056F5;font-weight:700;margin-top:2px;">Jami qarz</div>
        </div>` : ''}
      </div>`;

    data.forEach(g => {
      const hasTelegram = g.students.filter(s => s.hasTelegram).length;
      html += `
        <div style="margin-bottom:18px;">
          <!-- Guruh sarlavhasi -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <div>
              <div style="font-size:13px;font-weight:800;color:#0B1437;font-family:${FONT};">
                ${g.groupName}
              </div>
              <div style="font-size:11px;color:#8A93AD;font-weight:700;margin-top:1px;">
                ${g.subjectName}${g.teacherName ? ' · ' + g.teacherName : ''} · ${g.students.length} ta qarzdor
              </div>
            </div>
            ${g.totalDebt > 0 ? `
            <div style="background:#FCEDEC;border-radius:10px;padding:5px 10px;text-align:right;">
              <div style="font-size:12px;font-weight:800;color:#EF4444;font-family:${FONT};">${fmtSum(g.totalDebt)}</div>
              <div style="font-size:9.5px;color:#EF4444;font-weight:700;">jami qarz</div>
            </div>` : ''}
          </div>

          <!-- O'quvchilar ro'yxati -->
          <div style="background:#fff;border-radius:18px;border:1.5px solid #EAEDF3;overflow:hidden;margin-bottom:8px;">
            ${g.students.map((s, i) => {
              const rowBg = i % 2 === 0 ? '#fff' : '#FAFBFD';
              const phone = s.phoneSelf || s.phoneFather || s.phoneMother || '';

              // To'lov holati
              let statusHtml = '';
              if (s.noPay) {
                statusHtml = `<div style="font-size:11px;font-weight:700;color:#EF4444;background:#FCEDEC;
                                          padding:3px 8px;border-radius:8px;white-space:nowrap;">To'lovsiz</div>`;
              } else if (s.remainingAmount) {
                statusHtml = `<div style="font-size:11px;font-weight:700;color:#F59E0B;background:#FEF4E0;
                                          padding:3px 8px;border-radius:8px;white-space:nowrap;">Qisman</div>`;
              }

              return `
                <div style="display:flex;align-items:center;padding:12px 14px;
                            border-bottom:1px solid #F2F4F8;background:${rowBg};">
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:14px;font-weight:700;color:#0B1437;font-family:${FONT};
                                display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                      ${s.firstName} ${s.lastName}
                      ${s.hasTelegram ? `<span style="color:#2D5BFF;">${ICO.tg}</span>` : ''}
                    </div>
                    ${phone ? `
                    <div style="font-size:11.5px;color:#8A93AD;margin-top:2px;
                                display:flex;align-items:center;gap:3px;">
                      ${ICO.phone} ${phone}
                    </div>` : ''}
                    ${s.targetAmount ? `
                    <div style="font-size:11px;color:#8A93AD;margin-top:3px;
                                display:flex;align-items:center;gap:3px;">
                      ${ICO.tag}
                      Narx: ${fmtSum(s.targetAmount)} · To'lagan: ${fmtSum(s.paidAmount)}
                    </div>` : `
                    <div style="font-size:11px;color:#EF4444;margin-top:3px;font-weight:600;">
                      To'lagan: ${fmtSum(s.paidAmount)}
                    </div>`}
                    ${s.remainingAmount ? `
                    <div style="font-size:11.5px;color:#EF4444;font-weight:800;margin-top:3px;">
                      Qoldiq: ${fmtSum(s.remainingAmount)}
                    </div>` : ''}
                  </div>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-left:8px;">
                    ${statusHtml}
                    <!-- Shaxsiy xabar tugmasi -->
                    ${s.hasTelegram ? `
                    <button onclick="debtSendOne(${s.studentId}, ${g.groupId}, '${selMonth}', ${s.remainingAmount || 0})"
                      style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;
                             border-radius:9px;border:1.5px solid #EAEDF3;background:#fff;
                             font-size:11px;font-weight:700;cursor:pointer;color:#525B7A;
                             font-family:${FONT};white-space:nowrap;"
                      title="Shaxsiy xabar yuborish"
                      onmouseenter="this.style.background='#EAF0FF';this.style.borderColor='#2D5BFF';this.style.color='#2D5BFF';"
                      onmouseleave="this.style.background='#fff';this.style.borderColor='#EAEDF3';this.style.color='#525B7A';">
                      ${ICO.send} Xabar
                    </button>` : ''}
                  </div>
                </div>`;
            }).join('')}
          </div>

          <!-- Guruhga ommaviy xabar -->
          ${hasTelegram > 0 ? `
          <button onclick="debtNotifyGroup(${g.groupId}, '${g.groupName}', ${hasTelegram})"
            style="width:100%;padding:11px;border-radius:12px;border:1.5px solid #EAEDF3;
                   background:#fff;font-size:13px;font-weight:700;cursor:pointer;
                   color:#525B7A;font-family:${FONT};display:flex;align-items:center;
                   justify-content:center;gap:7px;"
            onmouseenter="this.style.background='#EAF0FF';this.style.borderColor='#2D5BFF';this.style.color='#2D5BFF';"
            onmouseleave="this.style.background='#fff';this.style.borderColor='#EAEDF3';this.style.color='#525B7A';">
            ${ICO.sendAll}
            Guruhga xabar yuborish (${hasTelegram} ta)
          </button>` : `
          <div style="text-align:center;padding:8px;font-size:11px;color:#B5BDD2;font-family:${FONT};">
            Bu guruhda botga ulangan o'quvchilar yo'q
          </div>`}
        </div>`;
    });

    res.innerHTML = html;

    // ── Shaxsiy xabar ───────────────────────────────────────────────
    window.debtSendOne = async (studentId, groupId, monthYear, remainingAmount) => {
      const mLbl2 = (typeof mLabel === 'function') ? mLabel(monthYear) : monthYear;
      const grp = lastData.find(g => g.groupId === groupId);
      const stu = grp?.students.find(s => s.studentId === studentId);
      if (!stu) return;

      openModal('Xabar yuborish', `
        <div style="background:#F8F9FC;border-radius:14px;padding:14px;margin-bottom:16px;
                    border:1px solid #EAEDF3;font-family:${FONT};">
          <div style="font-size:13px;font-weight:700;color:#0B1437;margin-bottom:4px;">
            ${stu.firstName} ${stu.lastName}
          </div>
          <div style="font-size:12px;color:#8A93AD;">${grp.groupName} · ${mLbl2}</div>
          ${stu.remainingAmount ? `<div style="font-size:13px;font-weight:700;color:#EF4444;margin-top:6px;">
            Qoldiq: ${fmtSum(stu.remainingAmount)}</div>` : ''}
        </div>
        <div style="font-size:13px;color:#8A93AD;margin-bottom:16px;font-family:${FONT};">
          O'quvchining Telegram ilovasiga to'lov eslatmasi yuboriladi.
        </div>
        <button id="debtSendOneBtn" onclick="debtSendOneConfirm(${studentId}, ${groupId}, '${monthYear}', ${remainingAmount})"
          style="width:100%;padding:14px;border-radius:14px;border:none;background:#2D5BFF;
                 color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:${FONT};
                 display:flex;align-items:center;justify-content:center;gap:8px;
                 box-shadow:0 4px 12px rgba(45,91,255,.3);">
          ${ICO.send.replace('currentColor','#fff')} Xabar yuborish
        </button>`);
    };

    window.debtSendOneConfirm = async (studentId, groupId, monthYear, remainingAmount) => {
      const btn = document.getElementById('debtSendOneBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = 'Yuborilmoqda...'; }
      try {
        await P('/notifications/debt', {
          studentId: parseInt(studentId),
          groupId: parseInt(groupId),
          monthYear,
          remainingAmount: remainingAmount || null
        });
        closeModal();
        toast('✓ Xabar yuborildi');
      } catch(e) {
        toast('✗ ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = 'Xabar yuborish'; }
      }
    };

    // ── Guruhga ommaviy xabar ────────────────────────────────────────
    window.debtNotifyGroup = (groupId, groupName, hasTg) => {
      const mLbl3 = (typeof mLabel === 'function') ? mLabel(selMonth) : selMonth;
      const grp = lastData.find(g => g.groupId === groupId);
      const debtorNames = (grp?.students || []).map(s =>
        `${s.firstName} ${s.lastName}${s.remainingAmount ? ' — ' + fmtSum(s.remainingAmount) : ''}`
      ).join('\n');

      openModal('Guruhga xabar yuborish', `
        <div style="background:#F8F9FC;border-radius:14px;padding:14px;margin-bottom:12px;
                    border:1px solid #EAEDF3;font-family:${FONT};">
          <div style="font-size:13px;font-weight:700;color:#0B1437;margin-bottom:4px;">
            ${groupName} — ${mLbl3}
          </div>
          <div style="font-size:12px;color:#8A93AD;">${hasTg} ta botga ulangan o'quvchi</div>
        </div>
        <div style="background:#F3F4F6;border-radius:12px;padding:13px;max-height:180px;
                    overflow-y:auto;font-size:12px;color:#525B7A;white-space:pre-line;
                    font-family:${FONT};line-height:1.6;margin-bottom:16px;">
          ${debtorNames || 'Ro\'yxat bo\'sh'}
        </div>
        <div style="font-size:12px;color:#8A93AD;margin-bottom:16px;font-family:${FONT};">
          Har bir o'quvchiga shaxsiy Telegram xabari yuboriladi.
        </div>
        <button id="debtGroupBtn" onclick="debtNotifyGroupConfirm(${groupId})"
          style="width:100%;padding:14px;border-radius:14px;border:none;background:#2D5BFF;
                 color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:${FONT};
                 display:flex;align-items:center;justify-content:center;gap:8px;
                 box-shadow:0 4px 12px rgba(45,91,255,.3);">
          ${ICO.sendAll.replace('currentColor','#fff')} Hammaga xabar yuborish
        </button>`);
    };

    window.debtNotifyGroupConfirm = async (groupId) => {
      const btn = document.getElementById('debtGroupBtn');
      if (btn) { btn.disabled = true; btn.innerHTML = 'Yuborilmoqda...'; }
      try {
        const r = await P('/debtors/notify', { groupId: parseInt(groupId), monthYear: selMonth });
        closeModal();
        const info = r.noTelegram > 0
          ? `✓ ${r.sent} ta yuborildi, ${r.noTelegram} ta botga ulanmagan`
          : `✓ ${r.sent} ta xabar yuborildi`;
        toast(info, 3500);
      } catch(e) {
        toast('✗ ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = 'Hammaga xabar yuborish'; }
      }
    };
  }

  drawMain();
}

// ============ ATTENDANCE ============
async function rAttendance(el) {

  const FONT = "'Plus Jakarta Sans','Inter',system-ui,sans-serif";
  const MON_UZ = ['Yanvar','Fevral','Mart','Aprel','May','Iyun',
                  'Iyul','Avgust','Sentyabr','Oktyabr','Noyabr','Dekabr'];

  // Bugungi sana YYYY-MM-DD formatda (local)
  function todayStr() {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
  }

  // Oyning so'nggi N oyi
  function getMonths() {
    const now = new Date(); const res = [];
    for (let i = -3; i <= 0; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
      res.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    return res;
  }

  const months = getMonths();
  let selMonth = nowMonth ? nowMonth() : months[months.length - 1];
  let selGroupId = null;
  let groups = [];

  // ── Guruhlarni yuklash ──────────────────────────────────────────────
  async function loadGroups() {
    groups = await G('/groups');
    drawMain();
  }

  // ── Asosiy ko'rinish: oy + guruh tanlash ───────────────────────────
  function drawMain() {
    const monthHtml = months.map(m => `
      <div class="mpb${m === selMonth ? ' on' : ''}"
           onclick="attSetMonth('${m}')"
           style="font-weight:700;${m === selMonth
             ? 'background:#2D5BFF;color:#fff;border-color:#2D5BFF;box-shadow:0 3px 10px rgba(45,91,255,.3);'
             : 'background:#fff;color:#525B7A;'}">
        ${mLabel(m)}
      </div>`).join('');

    const groupHtml = groups.length === 0
      ? `<div style="padding:20px;text-align:center;color:#8A93AD;font-family:${FONT};">
           Guruhlar yo'q
         </div>`
      : groups.map(g => `
          <div class="li" id="attg${g.id}" onclick="attSetGroup(${g.id})"
               style="transition:background .1s;">
            <div class="lic" style="background:#EAF0FF;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2D5BFF"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <div style="flex:1;">
              <div style="font-size:15px;font-weight:600;color:#0B1437;font-family:${FONT};">
                ${g.name}
              </div>
              <div style="font-size:12px;color:#8A93AD;font-family:${FONT};margin-top:2px;">
                ${g.subject?.name || ''} · ${g.teacher ? g.teacher.firstName + ' ' + g.teacher.lastName : '—'}
                · ${g._count?.groupStudents || 0} o'quvchi
              </div>
            </div>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>`).join('');

    el.innerHTML = `
      <div style="margin-bottom:14px;">
        <div style="font-size:11px;font-weight:800;color:#8A93AD;letter-spacing:0.6px;
                    text-transform:uppercase;margin-bottom:10px;font-family:${FONT};">
          Oy tanlang
        </div>
        <div class="mp">${monthHtml}</div>
      </div>
      <div style="font-size:11px;font-weight:800;color:#8A93AD;letter-spacing:0.6px;
                  text-transform:uppercase;margin-bottom:10px;font-family:${FONT};">
        Guruh tanlang
      </div>
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;">
        ${groupHtml}
      </div>
      <div id="attResult"></div>`;

    // Agar guruh oldin tanlangan bo'lsa — qayta highlight
    if (selGroupId) {
      const li = document.getElementById('attg' + selGroupId);
      if (li) li.style.background = '#EFF6FF';
    }

    window.attSetMonth = m => {
      selMonth = m;
      // Oy tugmalarini yangilash
      months.forEach(mn => {
        const btn = document.querySelector(`[onclick="attSetMonth('${mn}')"]`);
        if (btn) {
          btn.className = 'mpb' + (mn === m ? ' on' : '');
          btn.style.cssText = mn === m
            ? 'font-weight:700;background:#2D5BFF;color:#fff;border-color:#2D5BFF;box-shadow:0 3px 10px rgba(45,91,255,.3);'
            : 'font-weight:700;background:#fff;color:#525B7A;';
        }
      });
      if (selGroupId) loadAttTable(selGroupId);
    };

    window.attSetGroup = gid => {
      selGroupId = gid;
      // Highlight
      document.querySelectorAll('[id^="attg"]').forEach(li => {
        li.style.background = li.id === 'attg' + gid ? '#EFF6FF' : '';
      });
      loadAttTable(gid);
    };
  }

  // ── Davomat jadvalini yuklash ───────────────────────────────────────
  async function loadAttTable(gid) {
    const res = document.getElementById('attResult');
    if (!res) return;
    res.innerHTML = ldHtml ? ldHtml() : '';
    try {
      const [students, schedules] = await Promise.all([
        G('/groups/' + gid + '/students'),
        G('/schedule/group/' + gid + '?month=' + selMonth)
      ]);

      if (!students.length) {
        res.innerHTML = emHtml ? emHtml("Bu guruhda o'quvchilar yo'q") : '';
        return;
      }
      if (!schedules.length) {
        res.innerHTML = `
          <div style="background:#F8F9FC;border-radius:16px;padding:20px;
                      text-align:center;color:#8A93AD;font-family:${FONT};">
            ${mLabel(selMonth)} oyida dars belgilanmagan
          </div>`;
        return;
      }

      const td = todayStr();

      // Har o'quvchi uchun davomat
      const attAll = await Promise.all(
        students.map(s =>
          G('/attendance/student/' + s.id + '?groupId=' + gid + '&month=' + selMonth)
            .catch(() => [])
        )
      );

      // scheduleId → { lessonDate, isEditable }
      const schedMap = {};
      schedules.forEach(s => {
        const ds = new Date(s.lessonDate).toISOString().slice(0, 10);
        schedMap[s.id] = { ds, editable: ds <= td };
      });

      // Ustun sarlavhalari
      const dateLabels = schedules.map(s => {
        const d = new Date(s.lessonDate);
        const ds = d.toISOString().slice(0, 10);
        const isPast = ds <= td;
        return {
          label: String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0'),
          scheduleId: s.id,
          editable: isPast,
          ds
        };
      });

      // ── Jadval HTML ────────────────────────────────────────────────
      let html = `
        <div style="font-size:11px;font-weight:800;color:#8A93AD;letter-spacing:0.6px;
                    text-transform:uppercase;margin-bottom:10px;font-family:${FONT};">
          ${mLabel(selMonth)} — Davomat Jadvali
        </div>
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px;
                    border:1.5px solid #EAEDF3;background:#fff;">
          <table style="width:100%;border-collapse:collapse;font-size:12px;
                        min-width:${100 + schedules.length * 42}px;font-family:${FONT};">
            <thead>
              <tr>
                <th style="text-align:left;padding:12px 14px;background:#F8F9FC;
                           border-bottom:2px solid #EAEDF3;font-weight:800;color:#0B1437;
                           position:sticky;left:0;z-index:2;min-width:130px;">
                  O'quvchi
                </th>
                ${dateLabels.map(dl => `
                  <th style="padding:8px 4px;background:${dl.editable ? '#F8F9FC' : '#FFF8E8'};
                             border-bottom:2px solid #EAEDF3;font-weight:700;
                             color:${dl.editable ? '#525B7A' : '#B5BDD2'};
                             text-align:center;width:42px;font-size:11px;"
                      title="${dl.editable ? 'Davomat olish mumkin' : 'Kelajak — davomat olib bo\'lmaydi'}">
                    ${dl.label}
                    ${dl.editable ? '' : '<div style="font-size:8px;color:#D1D5DB;">🔒</div>'}
                  </th>`).join('')}
                <th style="padding:8px 10px;background:#F8F9FC;border-bottom:2px solid #EAEDF3;
                           font-weight:800;color:#0B1437;text-align:center;min-width:70px;">
                  Jami
                </th>
              </tr>
            </thead>
            <tbody>`;

      students.forEach((s, si) => {
        const attMap = {};
        (attAll[si] || []).forEach(a => { attMap[a.scheduleId] = a.isPresent; });

        let present = 0, total = 0;
        const cells = schedules.map((sch, idx) => {
          const dl = dateLabels[idx];
          const ip = attMap[sch.id];

          if (dl.editable) total++;
          if (ip === true && dl.editable) present++;

          if (!dl.editable) {
            return `<td style="text-align:center;padding:4px;background:#FFFDF0;">
              <span style="color:#E5E7EB;font-size:12px;">—</span>
            </td>`;
          }
          if (ip === true) return `
            <td style="text-align:center;padding:4px;cursor:pointer;"
                onclick="attEditDay(${sch.id}, ${s.id}, '${s.firstName} ${s.lastName}', ${gid})"
                title="Tahrirlash uchun bosing">
              <span style="color:#10B981;font-weight:800;font-size:16px;
                           display:block;line-height:1;transition:transform .1s;"
                    onmouseenter="this.style.transform='scale(1.2)'"
                    onmouseleave="this.style.transform='scale(1)'">✓</span>
            </td>`;
          if (ip === false) return `
            <td style="text-align:center;padding:4px;cursor:pointer;"
                onclick="attEditDay(${sch.id}, ${s.id}, '${s.firstName} ${s.lastName}', ${gid})"
                title="Tahrirlash uchun bosing">
              <span style="color:#EF4444;font-weight:800;font-size:16px;
                           display:block;line-height:1;transition:transform .1s;"
                    onmouseenter="this.style.transform='scale(1.2)'"
                    onmouseleave="this.style.transform='scale(1)'">✗</span>
            </td>`;
          // Davomat olinmagan — bosilsa davomat olinadi
          return `
            <td style="text-align:center;padding:4px;cursor:pointer;"
                onclick="attTakeDay(${sch.id}, '${dl.ds}', ${gid})"
                title="Davomat olish">
              <span style="color:#D1D5DB;font-size:14px;display:block;line-height:1;
                           transition:color .12s;"
                    onmouseenter="this.style.color='#8A93AD'"
                    onmouseleave="this.style.color='#D1D5DB'">—</span>
            </td>`;
        }).join('');

        const pct = total > 0 ? Math.round(present / total * 100) : null;
        const pctColor = pct === null ? '#B5BDD2' : pct >= 75 ? '#10B981' : pct >= 50 ? '#F59E0B' : '#EF4444';
        const rowBg = si % 2 === 0 ? '#fff' : '#FAFBFD';

        html += `
          <tr style="border-bottom:1px solid #F2F4F8;background:${rowBg};">
            <td style="padding:10px 14px;font-weight:600;color:#0B1437;
                       position:sticky;left:0;z-index:1;background:${rowBg};">
              ${s.firstName} ${s.lastName}
            </td>
            ${cells}
            <td style="text-align:center;padding:8px 4px;">
              ${pct !== null
                ? `<b style="color:${pctColor};font-size:13px;">${pct}%</b>
                   <div style="font-size:10px;color:#B5BDD2;">${present}/${total}</div>`
                : `<span style="color:#D1D5DB;font-size:12px;">—</span>`
              }
            </td>
          </tr>`;
      });

      html += `</tbody></table></div>`;

      // ── Davomat olish tugmasi ────────────────────────────────────────
      html += `
        <div style="margin-top:14px;display:flex;gap:10px;">
          <button onclick="attTakeAll(${gid})"
            style="flex:1;padding:13px;border-radius:14px;border:none;
                   background:#2D5BFF;color:#fff;font-size:14px;font-weight:700;
                   cursor:pointer;font-family:${FONT};
                   display:flex;align-items:center;justify-content:center;gap:8px;
                   box-shadow:0 4px 12px rgba(45,91,255,.3);"
            onmouseenter="this.style.background='#1A3FCE';"
            onmouseleave="this.style.background='#2D5BFF';">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            Bugungi davomatni olish
          </button>
        </div>`;

      res.innerHTML = html;

      // ─────────────────────────────────────────────────────────────────
      // attTakeAll — bugungi dars uchun davomat oynasini ochish
      // ─────────────────────────────────────────────────────────────────
      window.attTakeAll = async (groupId) => {
        const todayLocal = todayStr();
        // Bugungi jadval bor mi?
        const todaySch = schedules.find(s => {
          const ds = new Date(s.lessonDate).toISOString().slice(0, 10);
          return ds === todayLocal;
        });
        if (!todaySch) {
          toast('Bugun uchun dars jadvali topilmadi. Boshqa sanani tanlang yoki jadval qo\'shing.');
          return;
        }
        openAttendanceModal(todaySch.id, groupId);
      };

      // ─────────────────────────────────────────────────────────────────
      // attTakeDay — ma'lum bir kun uchun davomat oynasini ochish
      // ─────────────────────────────────────────────────────────────────
      window.attTakeDay = async (scheduleId, ds, groupId) => {
        if (ds > todayStr()) {
          toast('Kelajakdagi kun uchun davomat olib bo\'lmaydi');
          return;
        }
        openAttendanceModal(scheduleId, groupId);
      };

      // ─────────────────────────────────────────────────────────────────
      // attEditDay — bitta o'quvchi uchun bir kunni tahrirlash
      // ─────────────────────────────────────────────────────────────────
      window.attEditDay = async (scheduleId, studentId, studentName, groupId) => {
        // Shu jadval uchun barcha o'quvchi davomatini olamiz
        openAttendanceModal(scheduleId, groupId, studentId);
      };

    } catch (e) {
      const res2 = document.getElementById('attResult');
      if (res2) res2.innerHTML = emHtml ? emHtml('Xatolik: ' + e.message) : e.message;
    }
  }

  // ── Davomat modal oynasi ────────────────────────────────────────────
  // scheduleId — dars IDsi
  // groupId    — guruh IDsi
  // focusStudentId — (ixtiyoriy) faqat shu o'quvchini highlight qilish
  async function openAttendanceModal(scheduleId, groupId, focusStudentId) {
    if (typeof openModal !== 'function') return;
    openModal('Davomat yuklanmoqda...', ldHtml ? ldHtml() : '');

    try {
      const data = await G('/attendance/admin-sheet/' + scheduleId);

      const td = todayStr();
      const lessonDs = new Date(data.lessonDate).toISOString().slice(0, 10);
      const isFuture = lessonDs > td;

      if (isFuture) {
        const modalBody = document.querySelector('#modal > div > div:last-child');
        if (modalBody) modalBody.innerHTML = `
          <div style="text-align:center;padding:32px 20px;font-family:${FONT};">
            <div style="width:56px;height:56px;border-radius:16px;background:#FEF4E0;
                        display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
              🔒
            </div>
            <div style="font-size:15px;font-weight:700;color:#0B1437;margin-bottom:8px;">
              Kelajakdagi dars
            </div>
            <div style="font-size:13px;color:#8A93AD;">
              ${lessonDs} — bu kun uchun davomat olib bo'lmaydi.
            </div>
          </div>`;
        return;
      }

      // Checkbox holati: { groupStudentId → bool }
      const checked = {};
      data.students.forEach(s => {
        checked[s.groupStudentId] = s.isPresent === true;
      });

      const d = new Date(data.lessonDate);
      const dateLabel = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
      const editBadge = data.alreadyTaken
        ? `<span style="background:#FEF4E0;color:#F59E0B;font-size:10px;font-weight:700;
                        padding:2px 8px;border-radius:10px;margin-left:8px;">TAHRIRLASH</span>`
        : `<span style="background:#E6F8F0;color:#10B981;font-size:10px;font-weight:700;
                        padding:2px 8px;border-radius:10px;margin-left:8px;">YANGI</span>`;

      // Modal sarlavhasini yangilash
      const titleEl = document.querySelector('#modal [style*="font-size:18px"]');
      if (titleEl) titleEl.innerHTML = `
        ${data.groupName}${editBadge}
        <div style="font-size:12px;font-weight:600;color:#8A93AD;margin-top:4px;">
          ${dateLabel} · ${data.startTime}–${data.endTime}
          ${data.teacherName ? ' · ' + data.teacherName : ''}
        </div>`;

      // Hammani belgilash / olib tashlash
      let allChecked = data.students.every(s => checked[s.groupStudentId]);

      const rowsHtml = data.students.map(s => {
        const isFocus = focusStudentId && s.studentId === focusStudentId;
        return `
          <div class="chkr" id="attrow_${s.groupStudentId}"
               style="${isFocus ? 'background:#EAF0FF;border-radius:12px;padding:12px;margin:-4px;' : ''}"
               onclick="attToggle(${s.groupStudentId})">
            <div class="chk${checked[s.groupStudentId] ? ' on' : ''}" id="attchk_${s.groupStudentId}">
              ${checked[s.groupStudentId] ? '✓' : ''}
            </div>
            <div style="flex:1;font-size:14px;font-weight:${isFocus ? '700' : '500'};color:#0B1437;
                        font-family:${FONT};">
              ${s.firstName} ${s.lastName}
            </div>
            <div style="font-size:11px;color:${s.isPresent === true ? '#10B981' : s.isPresent === false ? '#EF4444' : '#D1D5DB'};
                        font-weight:700;">
              ${s.isPresent === true ? 'Kelgan' : s.isPresent === false ? 'Kelmagan' : 'Belgilanmagan'}
            </div>
          </div>`;
      }).join('');

      const bodyHtml = `
        <!-- Statistika -->
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <div style="flex:1;background:#E6F8F0;border-radius:12px;padding:10px;text-align:center;">
            <div id="att_cnt_present" style="font-size:20px;font-weight:800;color:#10B981;">
              ${Object.values(checked).filter(Boolean).length}
            </div>
            <div style="font-size:11px;color:#10B981;font-weight:700;">Kelgan</div>
          </div>
          <div style="flex:1;background:#FCEDEC;border-radius:12px;padding:10px;text-align:center;">
            <div id="att_cnt_absent" style="font-size:20px;font-weight:800;color:#EF4444;">
              ${Object.values(checked).filter(v => !v).length}
            </div>
            <div style="font-size:11px;color:#EF4444;font-weight:700;">Kelmagan</div>
          </div>
          <div style="flex:1;background:#F8F9FC;border-radius:12px;padding:10px;text-align:center;">
            <div style="font-size:20px;font-weight:800;color:#525B7A;">${data.students.length}</div>
            <div style="font-size:11px;color:#8A93AD;font-weight:700;">Jami</div>
          </div>
        </div>

        <!-- Hammani toggle -->
        <button id="attToggleAll"
          style="width:100%;padding:10px;border-radius:12px;
                 border:1.5px solid #EAEDF3;background:#F8F9FC;
                 font-size:13px;font-weight:700;cursor:pointer;
                 font-family:${FONT};color:#525B7A;margin-bottom:14px;"
          onclick="attToggleAllFn()">
          ${allChecked ? 'Barchasini olib tashlash' : 'Barchasini belgilash'}
        </button>

        <!-- Ro'yxat -->
        <div style="max-height:380px;overflow-y:auto;overscroll-behavior:contain;">
          ${rowsHtml}
        </div>

        <!-- Saqlash -->
        <div style="margin-top:16px;">
          <button onclick="attSaveModal(${scheduleId}, ${groupId})"
            style="width:100%;padding:14px;border-radius:14px;border:none;
                   background:#2D5BFF;color:#fff;font-size:15px;font-weight:700;
                   cursor:pointer;font-family:${FONT};
                   box-shadow:0 4px 12px rgba(45,91,255,.3);"
            onmouseenter="this.style.background='#1A3FCE';"
            onmouseleave="this.style.background='#2D5BFF';">
            ✓ Davomatni Saqlash
          </button>
        </div>`;

      const modalBody = document.querySelector('#modal > div > div:last-child');
      if (modalBody) modalBody.innerHTML = bodyHtml;

      // ── Checkbox toggle ────────────────────────────────────────────
      window.attToggle = (gsId) => {
        checked[gsId] = !checked[gsId];
        const chk = document.getElementById('attchk_' + gsId);
        if (chk) {
          chk.className = 'chk' + (checked[gsId] ? ' on' : '');
          chk.textContent = checked[gsId] ? '✓' : '';
        }
        // Statistika yangilash
        const pCount = Object.values(checked).filter(Boolean).length;
        const aCount = Object.values(checked).filter(v => !v).length;
        const pc = document.getElementById('att_cnt_present');
        const ac = document.getElementById('att_cnt_absent');
        if (pc) pc.textContent = pCount;
        if (ac) ac.textContent = aCount;
        // Toggle all tugmasini yangilash
        allChecked = pCount === data.students.length;
        const btn = document.getElementById('attToggleAll');
        if (btn) btn.textContent = allChecked ? 'Barchasini olib tashlash' : 'Barchasini belgilash';
      };

      window.attToggleAllFn = () => {
        allChecked = !allChecked;
        data.students.forEach(s => {
          checked[s.groupStudentId] = allChecked;
          const chk = document.getElementById('attchk_' + s.groupStudentId);
          if (chk) {
            chk.className = 'chk' + (allChecked ? ' on' : '');
            chk.textContent = allChecked ? '✓' : '';
          }
        });
        const pCount = allChecked ? data.students.length : 0;
        const pc = document.getElementById('att_cnt_present');
        const ac = document.getElementById('att_cnt_absent');
        if (pc) pc.textContent = pCount;
        if (ac) ac.textContent = data.students.length - pCount;
        const btn = document.getElementById('attToggleAll');
        if (btn) btn.textContent = allChecked ? 'Barchasini olib tashlash' : 'Barchasini belgilash';
      };

      // ── Saqlash ────────────────────────────────────────────────────
      window.attSaveModal = async (schId, grpId) => {
        const presentIds = Object.entries(checked)
          .filter(([, v]) => v)
          .map(([k]) => parseInt(k));
        try {
          await P('/attendance/admin-save/' + schId, { presentIds });
          toast('✓ Davomat saqlandi');
          closeModal();
          loadAttTable(grpId);
        } catch (e) {
          toast('✗ ' + e.message);
        }
      };

    } catch (e) {
      const modalBody = document.querySelector('#modal > div > div:last-child');
      if (modalBody) modalBody.innerHTML = `
        <div style="text-align:center;padding:32px;color:#EF4444;font-family:${FONT};">
          Xatolik: ${e.message}
        </div>`;
    }
  }

  // ── Ishga tushirish ────────────────────────────────────────────────
  loadGroups();
}


// ============ ARCHIVED STUDENTS ============
async function rArchivedStudents(el) {

  const FONT = "'Plus Jakarta Sans','Inter',system-ui,sans-serif";

  function fmtSum(n) {
    if (!n || n === '0') return '—';
    return Number(n).toLocaleString('ru-RU') + " so'm";
  }

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return `${String(dt.getDate()).padStart(2,'0')}.${String(dt.getMonth()+1).padStart(2,'0')}.${dt.getFullYear()}`;
  }

  const MON_UZ = ['Yan','Fev','Mar','Apr','May','Iyu','Iyu','Avg','Sen','Okt','Noy','Dek'];
  function fmtMonthYear(my) {
    if (!my) return '—';
    const [y, m] = my.split('-');
    return `${MON_UZ[parseInt(m) - 1]} ${y}`;
  }

  el.innerHTML = ldHtml ? ldHtml() : '';

  try {
    const data = await G('/archived-students');

    if (!data.length) {
      el.innerHTML = `
        <div style="text-align:center;padding:60px 20px;font-family:${FONT};">
          <div style="width:64px;height:64px;border-radius:20px;background:#F3F4F6;
                      display:flex;align-items:center;justify-content:center;
                      margin:0 auto 16px;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB"
                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </div>
          <div style="font-size:16px;font-weight:700;color:#0B1437;margin-bottom:8px;">
            O'chirilgan o'quvchilar yo'q
          </div>
          <div style="font-size:13px;color:#8A93AD;">
            Tizimdan o'chirilgan yoki barcha guruhlardan chiqarilgan o'quvchilar shu yerda ko'rinadi
          </div>
        </div>`;
      return;
    }

    // ── Qidiruv maydoni ──────────────────────────────────────────────
    let searchQ = '';

    function getFiltered() {
      if (!searchQ) return data;
      const q = searchQ.toLowerCase();
      return data.filter(s =>
        (s.firstName + ' ' + s.lastName).toLowerCase().includes(q) ||
        (s.phoneSelf || '').includes(q) ||
        (s.groups || []).some(g => g.groupName.toLowerCase().includes(q) || g.subjectName.toLowerCase().includes(q))
      );
    }

    function drawTable() {
      const filtered = getFiltered();
      const tableBody = document.getElementById('archTbody');
      const countEl  = document.getElementById('archCount');
      if (countEl) countEl.textContent = `${filtered.length} ta o'quvchi`;

      if (!tableBody) return;

      if (!filtered.length) {
        tableBody.innerHTML = `
          <tr><td colspan="7" style="text-align:center;padding:32px;color:#8A93AD;
                                     font-size:13px;font-family:${FONT};">
            Qidiruv natijasi topilmadi
          </td></tr>`;
        return;
      }

      tableBody.innerHTML = filtered.map((s, idx) => {
        const groupNames = (s.groups || [])
          .map(g => `<span style="display:inline-block;padding:2px 8px;border-radius:8px;
                                  background:#F3F4F6;font-size:10.5px;font-weight:700;
                                  color:#525B7A;margin:2px;">${g.groupName}</span>`)
          .join('');

        const rowBg = idx % 2 === 0 ? '#fff' : '#FAFBFD';

        const lastPayHtml = s.lastPayment
          ? `<div style="font-size:12px;font-weight:700;color:#10B981;">
               ${fmtSum(s.lastPayment.amount)}
             </div>
             <div style="font-size:10px;color:#8A93AD;margin-top:2px;">
               ${fmtMonthYear(s.lastPayment.monthYear)} · ${s.lastPayment.paymentType === 'cash' ? 'Naqd' : 'Karta'}
             </div>
             <div style="font-size:10px;color:#B5BDD2;">${s.lastPayment.groupName}</div>`
          : `<span style="color:#D1D5DB;font-size:13px;">—</span>`;

        const phones = [s.phoneSelf, s.phoneFather, s.phoneMother].filter(Boolean);

        return `
          <tr style="background:${rowBg};border-bottom:1px solid #F2F4F8;">
            <!-- # -->
            <td style="padding:12px 10px;text-align:center;font-size:12px;
                       font-weight:700;color:#B5BDD2;font-family:${FONT};">
              ${idx + 1}
            </td>
            <!-- Ism -->
            <td style="padding:12px 14px;position:sticky;left:0;z-index:1;background:${rowBg};">
              <div style="font-size:14px;font-weight:700;color:#0B1437;font-family:${FONT};">
                ${s.firstName} ${s.lastName}
              </div>
              ${phones.length
                ? `<div style="font-size:11px;color:#8A93AD;margin-top:3px;">${phones[0]}</div>`
                : ''
              }
              <div style="font-size:10px;color:#B5BDD2;margin-top:2px;">
                ${s.educationType === 'school' ? 'Maktab' : s.educationType === 'college' ? 'Kollej' : 'Katta'}
                ${s.grade ? ' · ' + s.grade : ''}
              </div>
            </td>
            <!-- Ro'yxatga olingan -->
            <td style="padding:12px 10px;text-align:center;font-family:${FONT};">
              <div style="font-size:12px;font-weight:600;color:#525B7A;">
                ${fmtDate(s.registeredAt)}
              </div>
            </td>
            <!-- O'chirilgan sana -->
            <td style="padding:12px 10px;text-align:center;font-family:${FONT};">
              <div style="font-size:12px;font-weight:700;color:#EF4444;">
                ${fmtDate(s.archivedDate)}
              </div>
            </td>
            <!-- Guruhlar -->
            <td style="padding:12px 10px;max-width:200px;font-family:${FONT};">
              ${groupNames || '<span style="color:#D1D5DB;font-size:12px;">—</span>'}
            </td>
            <!-- Oxirgi to'lov -->
            <td style="padding:12px 10px;font-family:${FONT};">
              ${lastPayHtml}
            </td>
            <!-- Jami to'lov -->
            <td style="padding:12px 10px;text-align:right;font-family:${FONT};">
              <div style="font-size:13px;font-weight:800;
                          color:${s.totalPaid !== '0' ? '#0B1437' : '#D1D5DB'};">
                ${fmtSum(s.totalPaid)}
              </div>
              ${s.paymentsCount > 0
                ? `<div style="font-size:10px;color:#8A93AD;margin-top:2px;">${s.paymentsCount} ta to'lov</div>`
                : ''
              }
            </td>
          </tr>`;
      }).join('');
    }

    // ── Asosiy layout ─────────────────────────────────────────────────
    el.innerHTML = `
      <!-- Sarlavha + statistika -->
      <div style="display:flex;align-items:center;justify-content:space-between;
                  margin-bottom:14px;flex-wrap:wrap;gap:10px;">
        <div>
          <div style="font-size:16px;font-weight:800;color:#0B1437;font-family:${FONT};">
            O'chirilgan O'quvchilar
          </div>
          <div id="archCount" style="font-size:12px;color:#8A93AD;font-family:${FONT};margin-top:2px;">
            ${data.length} ta o'quvchi
          </div>
        </div>
        <!-- Umumiy statistika -->
        <div style="display:flex;gap:8px;">
          <div style="background:#FCEDEC;border-radius:12px;padding:8px 14px;text-align:center;">
            <div style="font-size:18px;font-weight:800;color:#EF4444;">${data.length}</div>
            <div style="font-size:10px;color:#EF4444;font-weight:700;">O'chirilgan</div>
          </div>
          <div style="background:#E6F8F0;border-radius:12px;padding:8px 14px;text-align:center;">
            <div style="font-size:18px;font-weight:800;color:#10B981;">
              ${fmtSum(data.reduce((s, d) => s + BigInt(d.totalPaid || '0'), BigInt(0)).toString())}
            </div>
            <div style="font-size:10px;color:#10B981;font-weight:700;">Jami to'lagan</div>
          </div>
        </div>
      </div>

      <!-- Qidiruv -->
      <div style="display:flex;align-items:center;gap:10px;background:#F3F4F6;
                  border-radius:12px;padding:11px 14px;margin-bottom:14px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="archSearch" placeholder="Ism, telefon yoki guruh nomi bo'yicha qidiring..."
               style="border:none;background:transparent;outline:none;font-size:14px;
                      flex:1;font-family:${FONT};color:#0B1437;"
               oninput="archDoSearch(this.value)" />
      </div>

      <!-- Jadval -->
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px;
                  border:1.5px solid #EAEDF3;background:#fff;">
        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:680px;
                      font-family:${FONT};">
          <thead>
            <tr>
              <th style="padding:12px 10px;background:#F8F9FC;border-bottom:2px solid #EAEDF3;
                         font-weight:800;color:#8A93AD;text-align:center;width:40px;
                         font-size:11px;">#</th>
              <th style="padding:12px 14px;background:#F8F9FC;border-bottom:2px solid #EAEDF3;
                         font-weight:800;color:#0B1437;text-align:left;position:sticky;
                         left:0;z-index:2;min-width:150px;">O'quvchi</th>
              <th style="padding:12px 10px;background:#F8F9FC;border-bottom:2px solid #EAEDF3;
                         font-weight:800;color:#0B1437;text-align:center;min-width:90px;">
                Ro'yxat sanasi
              </th>
              <th style="padding:12px 10px;background:#F8F9FC;border-bottom:2px solid #EAEDF3;
                         font-weight:800;color:#EF4444;text-align:center;min-width:90px;">
                O'chirilgan sana
              </th>
              <th style="padding:12px 10px;background:#F8F9FC;border-bottom:2px solid #EAEDF3;
                         font-weight:800;color:#0B1437;text-align:left;min-width:160px;">
                Guruhlar
              </th>
              <th style="padding:12px 10px;background:#F8F9FC;border-bottom:2px solid #EAEDF3;
                         font-weight:800;color:#0B1437;text-align:left;min-width:140px;">
                Oxirgi To'lov
              </th>
              <th style="padding:12px 10px;background:#F8F9FC;border-bottom:2px solid #EAEDF3;
                         font-weight:800;color:#0B1437;text-align:right;min-width:110px;">
                Jami To'lagan
              </th>
            </tr>
          </thead>
          <tbody id="archTbody"></tbody>
        </table>
      </div>

      <!-- Izoh -->
      <div style="margin-top:12px;padding:12px 16px;background:#FEF4E0;border-radius:12px;
                  border:1px solid #FCD34D;font-family:${FONT};">
        <div style="font-size:12px;color:#92400E;font-weight:700;margin-bottom:4px;">
          ℹ️ Ma'lumot
        </div>
        <div style="font-size:12px;color:#B45309;line-height:1.6;">
          Bu ro'yxatda barcha guruhlardan chiqarilgan yoki tizimdan o'chirilgan o'quvchilar ko'rsatiladi.
          "O'chirilgan sana" — o'quvchi oxirgi guruhga qo'shilgan sanaga asoslanadi.
          Aniq o'chirish sanasini saqlash uchun keyingi modulda <b>deletedAt</b> maydoni sxemaga qo'shiladi.
        </div>
      </div>`;

    // Qidiruvni bog'lash
    window.archDoSearch = q => {
      searchQ = q;
      drawTable();
    };

    drawTable();

  } catch (e) {
    el.innerHTML = `
      <div style="text-align:center;padding:48px 20px;font-family:${FONT};">
        <div style="font-size:15px;font-weight:700;color:#EF4444;margin-bottom:8px;">
          Xatolik yuz berdi
        </div>
        <div style="font-size:13px;color:#8A93AD;">${e.message}</div>
        <button onclick="nav('archived')" style="margin-top:16px;padding:10px 20px;
                border-radius:12px;border:none;background:#2D5BFF;color:#fff;
                font-size:14px;font-weight:700;cursor:pointer;font-family:${FONT};">
          Qayta urinish
        </button>
      </div>`;
  }
}


// ============ DELETE STAFF ============
async function rDelStaff(el){
  async function load(){
    const staff=await G('/staff');
    el.innerHTML=`<div class="st" style="margin-bottom:12px">HODIMLARNI O'CHIRISH</div>
      ${staff.length===0?emHtml("Hodimlar yo'q"):`<div class="card" style="padding:0;overflow:hidden">${staff.map(s=>`<div class="li">
        <div class="lic" style="background:#fee2e2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div style="flex:1"><div style="font-size:15px;font-weight:500">${s.firstName} ${s.lastName}</div>
        <div style="font-size:12px;color:#9ca3af">${s.role==='teacher'?"O'qituvchi":'Qabulxona'}${s.subject?' · '+s.subject:''}</div></div>
        <button class="btn bd bsm" onclick="dsConf(${s.id},'${s.firstName} ${s.lastName}')">O'chirish</button>
      </div>`).join('')}</div>`}`;
    window.dsConf=(id,name)=>{
      openModal("O'chirishni tasdiqlang",`<div style="font-size:15px;color:#6b7280;margin-bottom:20px"><b>${name}</b> ni o'chirishni tasdiqlaysizmi?</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn bd" onclick="doDs(${id})">O'chirish</button>
          <button class="btn bs" onclick="closeModal()">Bekor qilish</button>
        </div>`);
      window.doDs=async id2=>{try{await D(`/staff/${id2}?action=delete`);closeModal();toast("O'chirildi");load();}catch(e){toast('❌ '+e.message);}};
    };
  }
  load();
}
