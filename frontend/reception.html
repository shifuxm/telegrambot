              </div>`).join('')}
            </div>`);
          window.doMove = async (s, og, ng) => {
            try { await U(`/students/${s}/groups/${og}/move`, { newGroupId: ng }); closeModal(); toast('✓ Ko\'chirildi'); eOpenG(og); } catch(e) { toast('✗ ' + e.message); }
          };
        };
      };
    };
  }

  function editGroups() {
    const ec = document.getElementById('editC');
    ec.innerHTML = `<div class="card" style="padding:0;overflow:hidden;">
      ${gs.map(g => `<div class="li" onclick="eOpenGH(${g.id})">
        <div class="lic" style="background:#E6F8F0;">${SVGI.groups.replace('stroke="currentColor"', 'stroke="#10B981"')}</div>
        <div style="flex:1;"><div style="font-weight:700;color:#0B1437;">${g.name}</div>
        <div style="font-size:12px;color:#8A93AD;">${g.subject?.name} · ${g.teacher?.firstName || ''} ${g.teacher?.lastName || ''}</div></div>
        ${SVGI.chevron}
      </div>`).join('')}
    </div>`;
    window.eOpenGH = async gid => {
      const [hist, teachers] = await Promise.all([G(`/groups/${gid}/teacher-history`), G('/staff/teachers')]);
      const g = gs.find(x => x.id === gid);
      openModal(g?.name || 'Guruh',
        '<div class="ig"><label class="il">Guruh nomi</label><input id="eg_name" class="inp" value="' + (g?.name || '') + '"/></div>' +
        '<div class="st" style="margin-top:4px;">O\'QITUVCHI</div>' +
        '<div class="ig"><select id="eg_t" class="inp"><option value="">O\'qituvchi o\'zgartirish</option>' +
        teachers.map(t => '<option value="' + t.id + '">' + t.firstName + ' ' + t.lastName + (t.subject ? ' — ' + t.subject : '') + '</option>').join('') +
        '</select></div>' +
        '<button class="btn bp" style="margin-bottom:20px;" id="egSaveBtn">' + SVGI.save + ' Saqlash</button>' +
        '<div class="st">O\'QITUVCHILAR TARIXI</div>' +
        (hist.length === 0
          ? '<div style="color:#8A93AD;font-size:14px;text-align:center;padding:12px;">Tarix yo\'q</div>'
          : hist.map(h =>
              '<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F2F4F8;">' +
              '<div><div style="font-weight:700;font-size:14px;">' + h.teacher.firstName + ' ' + h.teacher.lastName + '</div>' +
              '<div style="font-size:12px;color:#8A93AD;">' + (h.teacher.subject || '') + '</div></div>' +
              '<div style="text-align:right;font-size:12px;color:#8A93AD;">' +
              '<div>' + new Date(h.startDate).toLocaleDateString('uz-UZ') + '</div>' +
              '<div>' + (h.endDate ? new Date(h.endDate).toLocaleDateString('uz-UZ') : 'Hozir') + '</div></div></div>'
            ).join(''))
      );
      document.getElementById('egSaveBtn')?.addEventListener('click', async () => {
        const newName = document.getElementById('eg_name').value.trim();
        const tid = document.getElementById('eg_t').value;
        const body = {};
        if (newName && newName !== g?.name) body.name = newName;
        if (tid) body.teacherId = parseInt(tid);
        if (!Object.keys(body).length) return toast('Hech narsa o\'zgarmadingiz');
        try { await U('/groups/' + gid, body); closeModal(); toast('✓ Saqlandi'); editGroups(); }
        catch(e) { toast('✗ ' + e.message); }
      });
    };
  }
}

async function rConversion(el) {
  const FONT = "'Plus Jakarta Sans','Inter',system-ui,sans-serif";

  const ICO = {
    cashOut: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>`,
    cardIn:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
    arrow:   `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>`,
    save:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
    swap:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>`,
  };

  let type = 'cash_to_card', from = '', to = '';

  function fmtSum(n) { return n ? Number(n).toLocaleString('ru-RU') + " so'm" : ''; }

  function draw() {
    const isCTC = type === 'cash_to_card';

    const tabStyle = (active) => `
      flex:1;padding:11px 6px;border-radius:12px;
      border:${active ? 'none' : '1.5px solid #EAEDF3'};
      background:${active ? '#2D5BFF' : '#fff'};
      color:${active ? '#fff' : '#525B7A'};
      font-size:13px;font-weight:700;cursor:pointer;font-family:${FONT};
      display:flex;align-items:center;justify-content:center;gap:7px;
      ${active ? 'box-shadow:0 4px 10px rgba(45,91,255,.25);' : ''}`;

    el.innerHTML = `
      <!-- Tab tugmalar -->
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button style="${tabStyle(isCTC)}" onclick="cvt('cash_to_card')">
          ${ICO.cashOut.replace('stroke="currentColor"',`stroke="${isCTC ? '#fff' : '#525B7A'}"`)
            .replace('width="22" height="22"','width="18" height="18"')}
          Naqd → Karta
        </button>
        <button style="${tabStyle(!isCTC)}" onclick="cvt('card_to_cash')">
          ${ICO.cardIn.replace('stroke="currentColor"',`stroke="${!isCTC ? '#fff' : '#525B7A'}"`)
            .replace('width="22" height="22"','width="18" height="18"')}
          Karta → Naqd
        </button>
      </div>

      <!-- Yuborildi -->
      <div style="background:#F8F9FC;border-radius:18px;border:1.5px solid #EAEDF3;padding:16px;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:40px;height:40px;border-radius:12px;
                      background:${isCTC ? '#E6F8F0' : '#EAF0FF'};
                      display:flex;align-items:center;justify-content:center;">
            ${(isCTC ? ICO.cashOut : ICO.cardIn).replace('stroke="currentColor"',`stroke="${isCTC ? '#10B981' : '#2D5BFF'}"`)}
          </div>
          <div style="font-size:12px;font-weight:800;color:#8A93AD;letter-spacing:.5px;text-transform:uppercase;font-family:${FONT};">
            ${isCTC ? 'Naqd berildi' : 'Kartadan olindi'}
          </div>
        </div>
        <input id="cv_f" type="number" class="inp"
          style="font-size:24px;font-weight:800;border:none;padding:0;background:transparent;
                 font-family:${FONT};"
          placeholder="Summani kiriting" value="${from}"
          oninput="cvfm('from',this.value)"/>
        <div id="cv_ff" style="font-size:14px;color:#8A93AD;margin-top:4px;font-family:${FONT};
                                ${from ? '' : 'display:none'}">${fmtSum(from)}</div>
      </div>

      <!-- Ok -->
      <div style="text-align:center;margin-bottom:12px;">${ICO.arrow}</div>

      <!-- Qabul qilindi -->
      <div style="background:#EAF0FF;border-radius:18px;border:1.5px solid #2D5BFF;padding:16px;margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
          <div style="width:40px;height:40px;border-radius:12px;
                      background:${!isCTC ? '#E6F8F0' : '#fff'};
                      display:flex;align-items:center;justify-content:center;">
            ${(!isCTC ? ICO.cashOut : ICO.cardIn).replace('stroke="currentColor"',`stroke="${!isCTC ? '#10B981' : '#2D5BFF'}"`)}
          </div>
          <div style="font-size:12px;font-weight:800;color:#2D5BFF;letter-spacing:.5px;text-transform:uppercase;font-family:${FONT};">
            ${isCTC ? 'Karta qabul' : 'Naqd olindi'}
          </div>
        </div>
        <input id="cv_t" type="number" class="inp"
          style="font-size:24px;font-weight:800;border:none;padding:0;background:transparent;
                 color:#2D5BFF;font-family:${FONT};"
          placeholder="Summani kiriting" value="${to}"
          oninput="cvfm('to',this.value)"/>
        <div id="cv_tf" style="font-size:14px;color:#2D5BFF;margin-top:4px;font-family:${FONT};
                                ${to ? '' : 'display:none'}">${fmtSum(to)}</div>
      </div>

      <!-- Saqlash -->
      <button onclick="cvSave()"
        style="width:100%;padding:14px;border-radius:14px;border:none;background:#2D5BFF;
               color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:${FONT};
               display:flex;align-items:center;justify-content:center;gap:8px;
               box-shadow:0 4px 12px rgba(45,91,255,.3);"
        onmouseenter="this.style.background='#1A3FCE';"
        onmouseleave="this.style.background='#2D5BFF';">
        ${ICO.save} Saqlash
      </button>`;

    window.cvt = t => { type = t; draw(); };
    window.cvfm = (side, v) => {
      if (side === 'from') from = v; else to = v;
      const e = document.getElementById(`cv_${side === 'from' ? 'ff' : 'tf'}`);
      if (e) { if (v) { e.style.display = 'block'; e.textContent = fmtSum(v); } else e.style.display = 'none'; }
    };
    window.cvSave = async () => {
      const f = document.getElementById('cv_f')?.value;
      const t = document.getElementById('cv_t')?.value;
      if (!f || !t) return toast('Ikkala summani kiriting');
      try {
        await P('/conversions', { type, fromAmount: parseInt(f), toAmount: parseInt(t) });
        toast('✓ Saqlandi');
        from = ''; to = '';
        draw();
      } catch(e) { toast('✗ ' + e.message); }
    };
  }

  draw();
}

async function rArchive(el) {
  const FONT = "'Plus Jakarta Sans','Inter',system-ui,sans-serif";

  const ICO = {
    groups:  `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
    archive: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
    trash:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`,
    back:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>`,
    restore: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>`,
    chevron: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>`,
    warning: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#92400E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  };

  let tab = 'active';

  async function load() {
    try {
      const groups = await G('/groups');
      const ag = groups.filter(g => g.status !== 'inactive');

      if (tab === 'active') {
        el.innerHTML = `
          <div class="tabs">
            <button class="tab on" id="tabAct">Faol o'quvchilar</button>
            <button class="tab" id="tabArch">Arxiv</button>
          </div>
          <div class="st">GURUH TANLANG</div>
          <div class="card" style="padding:0;overflow:hidden;" id="archGList"></div>`;

        document.getElementById('archGList').innerHTML = ag.map(g =>
          `<div class="li" id="ag${g.id}">
            <div class="lic" style="background:#E6F8F0;">${ICO.groups}</div>
            <div style="flex:1;"><div style="font-size:15px;font-weight:700;color:#0B1437;font-family:${FONT};">${g.name}</div>
            <div style="font-size:12px;color:#8A93AD;font-family:${FONT};">${g.subject?.name || ''}</div></div>
            ${ICO.chevron}
          </div>`
        ).join('');
        ag.forEach(g => { document.getElementById('ag' + g.id)?.addEventListener('click', () => showGroup(g, ag)); });

      } else {
        // ── ARXiV TAB: Faqat bu yerda HARD DELETE tugmasi ─────────────
        const all = await Promise.all(ag.map(g =>
          G('/groups/' + g.id + '/students?status=archived').then(sts => ({ g, sts })).catch(() => ({ g, sts: [] }))
        ));
        const hasData = all.filter(x => x.sts.length > 0);

        el.innerHTML = `
          <div class="tabs">
            <button class="tab" id="tabAct">Faol o'quvchilar</button>
            <button class="tab on" id="tabArch">Arxiv</button>
          </div>
          <!-- Izoh -->
          <div style="display:flex;align-items:flex-start;gap:8px;padding:12px 14px;
                      background:#FEF4E0;border-radius:12px;border:1px solid #FCD34D;
                      margin-bottom:14px;font-family:${FONT};">
            ${ICO.warning}
            <div style="font-size:12px;color:#92400E;line-height:1.5;">
              Bu sahifadagi o'quvchilarni butunlay o'chirish mumkin.
              <b>O'chirish qaytarib bo'lmaydi</b> va barcha tarix, to'lovlar, davomat ma'lumotlari yo'qoladi.
            </div>
          </div>
          ${hasData.length === 0
            ? `<div style="text-align:center;padding:40px 20px;color:#8A93AD;font-family:${FONT};">Arxivda o'quvchilar yo'q</div>`
            : hasData.map(({ g, sts }) => `
              <div style="margin-bottom:14px;">
                <div class="st">${g.name} — ${g.subject?.name || ''}</div>
                <div class="card" style="padding:0;overflow:hidden;">
                  ${sts.map(s => `
                    <div class="li">
                      <div style="flex:1;">
                        <div style="font-size:15px;font-weight:700;color:#0B1437;font-family:${FONT};">${s.firstName} ${s.lastName}</div>
                        <div style="font-size:12px;color:#8A93AD;font-family:${FONT};">${s.phoneSelf || s.phoneFather || '—'}</div>
                      </div>
                      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
                        <!-- Qaytarish -->
                        <button id="rest${s.id}x${g.id}"
                          style="padding:5px 10px;border-radius:9px;border:1.5px solid #EAEDF3;
                                 background:#fff;font-size:11px;font-weight:700;cursor:pointer;
                                 color:#10B981;font-family:${FONT};display:flex;align-items:center;gap:4px;"
                          onmouseenter="this.style.background='#E6F8F0';this.style.borderColor='#10B981';"
                          onmouseleave="this.style.background='#fff';this.style.borderColor='#EAEDF3';">
                          ${ICO.restore.replace('stroke="currentColor"','stroke="#10B981"')} Qaytarish
                        </button>
                        <!-- Butunlay O'chirish -->
                        <button id="hardDel${s.id}"
                          style="padding:5px 10px;border-radius:9px;border:1.5px solid #FECACA;
                                 background:#FCEDEC;font-size:11px;font-weight:700;cursor:pointer;
                                 color:#EF4444;font-family:${FONT};display:flex;align-items:center;gap:4px;">
                          ${ICO.trash.replace('stroke="currentColor"','stroke="#EF4444"')} O'chirish
                        </button>
                      </div>
                    </div>`).join('')}
                </div>
              </div>`).join('')}`;

        // Event listeners
        hasData.forEach(({ g, sts }) => {
          sts.forEach(s => {
            // Qaytarish
            document.getElementById('rest' + s.id + 'x' + g.id)?.addEventListener('click', async () => {
              try { await P('/students/' + s.id + '/groups', { groupId: g.id }); toast('✓ Qaytarildi'); load(); }
              catch(e) { toast('✗ ' + e.message); }
            });

            // Butunlay o'chirish — tasdiqlash oynasi
            document.getElementById('hardDel' + s.id)?.addEventListener('click', () => {
              openModal("Butunlay o'chirish", `
                <div style="font-size:14px;color:#525B7A;margin-bottom:16px;font-family:${FONT};line-height:1.6;">
                  <b style="color:#0B1437;">${s.firstName} ${s.lastName}</b> ni tizimdan
                  <b style="color:#EF4444;">butunlay o'chirishni</b> tasdiqlaysizmi?
                </div>
                <div style="background:#FCEDEC;border-radius:12px;padding:12px;margin-bottom:16px;
                            border:1px solid #FECACA;font-size:12px;color:#DC2626;font-family:${FONT};
                            display:flex;align-items:flex-start;gap:7px;">
                  ${ICO.warning.replace('stroke="#92400E"','stroke="#DC2626"')}
                  <div style="line-height:1.5;">
                    Bu amal <b>qaytarib bo'lmaydi!</b> Barcha to'lovlar, davomat, narx tarixi
                    va profil ma'lumotlari butunlay o'chib ketadi.
                  </div>
                </div>
                <div style="display:flex;gap:10px;">
                  <button onclick="closeModal()"
                    style="flex:1;padding:12px;border-radius:12px;border:1.5px solid #EAEDF3;
                           background:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:${FONT};">
                    Bekor
                  </button>
                  <button id="confirmHardDel"
                    style="flex:2;padding:12px;border-radius:12px;border:none;background:#EF4444;
                           color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:${FONT};
                           display:flex;align-items:center;justify-content:center;gap:7px;">
                    ${ICO.trash.replace('stroke="currentColor"','stroke="#fff"')} Ha, butunlay o'chirish
                  </button>
                </div>`);

              document.getElementById('confirmHardDel')?.addEventListener('click', async () => {
                const btn = document.getElementById('confirmHardDel');
                if (btn) { btn.disabled = true; btn.textContent = 'O\'chirilmoqda...'; }
                try {
                  await D('/students/' + s.id + '?action=hard_delete');
                  closeModal();
                  toast('O\'chirildi');
                  load();
                } catch(e) {
                  toast('✗ ' + e.message);
                  if (btn) { btn.disabled = false; btn.innerHTML = `${ICO.trash.replace('stroke="currentColor"','stroke="#fff"')} Ha, butunlay o'chirish`; }
                }
              });
            });
          });
        });
      }

      document.getElementById('tabAct')?.addEventListener('click', () => { tab = 'active'; load(); });
      document.getElementById('tabArch')?.addEventListener('click', () => { tab = 'archived'; load(); });

    } catch(e) { el.innerHTML = emHtml ? emHtml('Xatolik: ' + e.message) : ''; }
  }

  async function showGroup(g, allGroups) {
    const sts = await G('/groups/' + g.id + '/students');
    const curMonth = (typeof nowMonth === 'function') ? nowMonth() : '';
    const pays = await Promise.all(sts.map(s =>
      G('/payments?studentId=' + s.id + '&monthYear=' + curMonth + '&groupId=' + g.id).catch(() => [])
    ));

    el.innerHTML = `
      <button class="btn bs" style="width:auto;margin-bottom:12px;" id="archBk">
        <span style="display:flex;align-items:center;gap:6px;">${ICO.back} Orqaga</span>
      </button>
      <div style="font-size:16px;font-weight:800;color:#0B1437;margin-bottom:4px;font-family:${FONT};">${g.name}</div>
      <div style="font-size:13px;color:#8A93AD;margin-bottom:16px;font-family:${FONT};">${g.subject?.name || ''}</div>
      ${sts.length === 0
        ? `<div style="text-align:center;padding:24px;color:#8A93AD;font-family:${FONT};">O'quvchilar yo'q</div>`
        : `<div class="card" style="padding:0;overflow:hidden;">
            ${sts.map((s, i) => {
              const paid = (pays[i] || []).reduce((sum, p) => sum + Number(p.amount), 0);
              const paidStr = paid > 0
                ? `<div style="font-size:12px;color:#10B981;margin-top:2px;font-family:${FONT};">${curMonth}: ${paid.toLocaleString('ru-RU')} so'm to'lov</div>`
                : `<div style="font-size:12px;color:#EF4444;margin-top:2px;font-family:${FONT};">${curMonth}: to'lovsiz</div>`;
              return `
                <div class="li">
                  <div style="flex:1;">
                    <div style="font-size:15px;font-weight:700;color:#0B1437;font-family:${FONT};">${s.firstName} ${s.lastName}</div>
                    <div style="font-size:12px;color:#8A93AD;font-family:${FONT};">${s.phoneSelf || s.phoneFather || '—'}</div>
                    ${paidStr}
                  </div>
                  <button class="btn bd bsm" id="archd${s.id}"
                    style="display:flex;align-items:center;gap:5px;">
                    ${ICO.archive.replace('stroke="currentColor"','stroke="#EF4444"')} Arxivlash
                  </button>
                </div>`;
            }).join('')}
          </div>`}`;

    document.getElementById('archBk')?.addEventListener('click', load);
    sts.forEach(s => {
      document.getElementById('archd' + s.id)?.addEventListener('click', async () => {
        try {
          await D('/students/' + s.id + '/groups/' + g.id);
          toast('✓ Arxivga o\'kazildi');
          showGroup(g, allGroups);
        } catch(e) { toast('✗ ' + e.message); }
      });
    });
  }

  load();
}

async function init() {
  try {
    const user = await G('/auth/me');
    if (!['receptionist', 'admin'].includes(user.role)) {
      throw new Error('Ruxsat yo\'q');
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    setupSidebar(user);
    nav('applist');
  } catch(e) {
    const ld = document.getElementById('loading');

    ld.innerHTML = `

}
