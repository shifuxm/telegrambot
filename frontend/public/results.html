<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Natijalar</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa}
.topbar{background:#07568A;color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;font-size:17px;font-weight:600;gap:10px}
.mp{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.mp::-webkit-scrollbar{display:none}
.mpb{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1.5px solid #e5e7eb;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#6b7280;white-space:nowrap}
.mpb.on{background:#07568A;color:#fff;border-color:#07568A}
.li{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f3f4f6}
.li:first-child{border-radius:16px 16px 0 0}.li:last-child{border-bottom:none;border-radius:0 0 16px 16px}.li:only-child{border-radius:16px}
</style>
</head>
<body>
<div class="topbar">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
  Natijalar
</div>
<div style="padding:16px" id="main">
  <div style="display:flex;justify-content:center;padding:48px">
    <svg style="animation:spin .7s linear infinite" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#07568A" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/></svg>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();}
async function G(p){const r=await fetch('/api'+p);const d=await r.json();if(!r.ok)throw new Error(d.error);return d;}

async function init(){
  const[years,subs]=await Promise.all([G('/results/years'),G('/subjects')]);
  const el=document.getElementById('main');
  if(!years.length){el.innerHTML=`<div style="text-align:center;padding:48px;color:#9ca3af"><div style="font-size:48px;margin-bottom:12px">🏆</div><div>Natijalar yo'q</div></div>`;return;}
  let sy=years[0],ss=null;
  async function load(){
    const results=await G(`/results?year=${sy}${ss?`&subjectId=${ss}`:''}`);
    el.innerHTML=`
      <div class="mp" style="margin-bottom:16px">${years.map(y=>`<div class="mpb${y==sy?' on':''}" onclick="ry(${y})">${y}</div>`).join('')}</div>
      <div class="mp" style="margin-bottom:16px">
        <div class="mpb${!ss?' on':''}" onclick="rs(null)">Barchasi</div>
        ${subs.map(s=>`<div class="mpb${ss==s.id?' on':''}" onclick="rs(${s.id})">${s.name}</div>`).join('')}
      </div>
      <div style="background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden">
        ${results.length===0?`<div style="padding:20px;text-align:center;color:#9ca3af">Natijalar yo'q</div>`:
        results.map(r=>`<div class="li">
          <div style="flex:1"><div style="font-size:15px;font-weight:500">${r.studentName}</div><div style="font-size:12px;color:#9ca3af">${r.subject?.name}</div></div>
          <div style="font-size:20px;font-weight:700;color:#07568A">${r.score}</div>
        </div>`).join('')}
      </div>`;
    window.ry=y=>{sy=y;load();};window.rs=s=>{ss=s;load();};
  }
  load();
}
init();
</script>
</body>
</html>
