<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Qabulga yozilish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f7fa}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar{background:#07568A;color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;font-size:17px;font-weight:600}
.inp{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;outline:none;background:#fff;-webkit-appearance:none}
.inp:focus{border-color:#07568A}
.ig{margin-bottom:16px}
.il{font-size:12px;font-weight:700;color:#6b7280;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.4px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.bp{background:#07568A;color:#fff}
.chkr{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
.chkr:last-child{border-bottom:none}
.chk{width:24px;height:24px;border-radius:7px;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chk.on{background:#22c55e;border-color:#22c55e;color:#fff;font-size:13px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;font-weight:500;z-index:9999;white-space:nowrap;display:none}
</style>
</head>
<body>
<div id="toast"></div>
<div class="topbar">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:10px"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
  Qabulga yozilish
</div>
<div style="padding:16px" id="main"></div>

<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();}
async function G(p){const r=await fetch('/api'+p);const d=await r.json();if(!r.ok)throw new Error(d.error);return d;}
async function P(p,b){const r=await fetch('/api'+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});const d=await r.json();if(!r.ok)throw new Error(d.error);return d;}
let _tt;function toast(msg,ms=2800){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(_tt);_tt=setTimeout(()=>t.style.display='none',ms);}

async function init(){
  const subs=await G('/subjects');
  let selSubs=[];
  const el=document.getElementById('main');
  el.innerHTML=`
    <div class="ig"><label class="il">Ismi</label><input id="fn" class="inp" placeholder="Ismi"/></div>
    <div class="ig"><label class="il">Familyasi</label><input id="ln" class="inp" placeholder="Familyasi"/></div>
    <div class="ig"><label class="il">O'qish joyi</label><select id="edu" class="inp" onchange="eduC()"><option value="school">Maktab</option><option value="college">Kollej</option><option value="adult">Yuqori yosh</option></select></div>
    <div id="gd" class="ig"><label class="il">Sinfi</label><input id="grade" type="number" min="1" max="11" class="inp" placeholder="1-11"/></div>
    <div class="ig"><label class="il">O'zining telefoni</label><input id="ps" class="inp" placeholder="+998..."/></div>
    <div class="ig"><label class="il">Otasining telefoni</label><input id="pf" class="inp" placeholder="+998..."/></div>
    <div class="ig"><label class="il">Onasining telefoni</label><input id="pm" class="inp" placeholder="+998..."/></div>
    <div class="ig"><label class="il">Fanlar</label>
      <div style="background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:8px 16px">
        ${subs.length===0?`<div style="color:#9ca3af;font-size:14px;padding:8px 0">Fanlar mavjud emas</div>`:
        subs.map(s=>`<div class="chkr" onclick="tog(${s.id})"><div class="chk" id="cb_${s.id}"></div><span style="font-size:15px;font-weight:500">${s.name}</span></div>`).join('')}
      </div></div>
    <button class="btn bp" onclick="save()">Yuborish</button>`;
  window.eduC=()=>{document.getElementById('gd').style.display=document.getElementById('edu').value==='school'?'block':'none';};
  window.tog=id=>{const cb=document.getElementById(`cb_${id}`);const i=selSubs.indexOf(id);if(i>-1){selSubs.splice(i,1);cb.classList.remove('on');cb.textContent='';}else{selSubs.push(id);cb.classList.add('on');cb.textContent='✓';}};
  window.save=async()=>{
    const body={firstName:document.getElementById('fn').value.trim(),lastName:document.getElementById('ln').value.trim(),educationType:document.getElementById('edu').value,grade:document.getElementById('grade')?.value||'',phoneSelf:document.getElementById('ps').value.trim(),phoneFather:document.getElementById('pf').value.trim(),phoneMother:document.getElementById('pm').value.trim(),subjectIds:selSubs};
    if(!body.firstName||!body.lastName)return toast('Ism va familya kerak');
    if(!body.phoneSelf&&!body.phoneFather&&!body.phoneMother)return toast('Kamida bitta telefon kerak');
    if(!body.subjectIds.length)return toast('Kamida bitta fan tanlang');
    try{
      await P('/applicants',body);
      el.innerHTML=`<div style="text-align:center;padding:80px 20px"><div style="font-size:64px;margin-bottom:16px">✅</div><div style="font-size:20px;font-weight:700;color:#1f2937;margin-bottom:8px">Muvaffaqiyatli yuborildi!</div><div style="font-size:15px;color:#6b7280">Qabulxona siz bilan tez orada bog'lanadi.</div></div>`;
    } catch(e){toast('❌ '+e.message);}
  };
}
init();
</script>
</body>
</html>
